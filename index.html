<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Access Portal</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#1f2937,#111827);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#ffffff;
  padding:40px;
  width:320px;
  border-radius:12px;
  box-shadow:0 20px 40px rgba(0,0,0,0.25);
  text-align:center;
}

.logo{
  width:70px;
  margin-bottom:15px;
}

h2{
  margin:10px 0 25px 0;
  color:#111827;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:1px solid #d1d5db;
  border-radius:8px;
  font-size:14px;
}

button{
  width:100%;
  padding:12px;
  background:#111827;
  color:#fff;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#000;
}

button:disabled{
  background:#6b7280;
  cursor:not-allowed;
}

.message{
  margin-top:15px;
  font-size:14px;
  min-height:20px;
}

.success{color:green;}
.error{color:red;}
</style>
</head>

<body>

<div class="card">

  <!-- โลโก้ -->
  <img src="https://cdn-icons-png.flaticon.com/512/3064/3064155.png" class="logo">

  <h2>Secure Access Portal</h2>

  <input type="text" id="user" placeholder="User ID">
  <input type="password" id="pass" placeholder="Password">

  <button id="loginBtn">SIGN IN</button>

  <div id="msg" class="message"></div>
</div>

<script>

let attempts = 0;
let lockTime = 0;
let timer;

const correctUser = "admin";
const correctPass = "1234";

const btn = document.getElementById("loginBtn");
const msg = document.getElementById("msg");

btn.addEventListener("click", function(){

  if(lockTime > 0){
    msg.textContent = "Locked. Wait " + lockTime + " sec.";
    msg.className = "message error";
    return;
  }

  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  btn.disabled = true;
  btn.textContent = "Authenticating...";

  setTimeout(()=>{

    if(user === correctUser && pass === correctPass){
      msg.textContent = "Access Granted. Redirecting...";
      msg.className = "message success";

      setTimeout(()=>{
        window.location.href = "dashboard.html";
      },1000);

      attempts = 0;

    }else{
      attempts++;
      msg.textContent = "Invalid credentials ("+attempts+")";
      msg.className = "message error";
      btn.disabled = false;
      btn.textContent = "SIGN IN";

      if(attempts === 3) startLock(10);
      if(attempts === 6) startLock(20);
      if(attempts >= 9) startLock(30);
    }

  },1000);

});

function startLock(seconds){
  lockTime = seconds;
  btn.disabled = true;

  timer = setInterval(()=>{
    lockTime--;
    msg.textContent = "Locked. Wait " + lockTime + " sec.";

    if(lockTime <= 0){
      clearInterval(timer);
      btn.disabled = false;
      btn.textContent = "SIGN IN";
      msg.textContent = "";
      attempts = 0;
    }

  },1000);
}

</script>

</body>
</html>
