<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS CORE | Secure Access</title>

<style>
*{box-sizing:border-box}

html,body{
    margin:0;
    height:100%;
    font-family:Segoe UI, Arial, sans-serif;
    background:#eef2f5;
    color:#1f2933;
}

/* ===== Layout Structure ===== */
.wrapper{
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* ===== Header ===== */
.header{
    background:#1e2a34;
    color:#fff;
    padding:16px 24px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:14px;
}

/* ===== Main Content ===== */
.main{
    flex:1;
    padding:40px 16px 60px 16px;
}

/* ===== Panel ===== */
.panel{
    width:100%;
    max-width:500px;
    margin:0 auto;
    background:#fff;
    padding:40px 32px;
    border:1px solid #d7dde3;
}

.logo{
    width:70px;
    display:block;
    margin:0 auto 20px auto;
}

h1{
    text-align:center;
    font-size:18px;
    margin:0;
    font-weight:600;
}

.subtitle{
    text-align:center;
    font-size:13px;
    color:#6b7280;
    margin:8px 0 26px 0;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:14px;
    border:1px solid #cbd5e1;
    font-size:14px;
}

input:focus{
    outline:none;
    border-color:#1e2a34;
}

button{
    width:100%;
    padding:12px;
    background:#1e2a34;
    color:#fff;
    border:none;
    font-size:14px;
    cursor:pointer;
}

button:hover{
    background:#162028;
}

/* ===== Footer ===== */
.footer{
    text-align:center;
    font-size:11px;
    padding:16px;
    border-top:1px solid #d7dde3;
    background:#f6f8fa;
    color:#6b7280;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="header">
    <div>เน็กซัส คอร์</div>
    <div id="datetime"></div>
</div>

<div class="main">
    <div class="panel">

        <img src="logo.png" class="logo" alt="logo">

        <h1>การตรวจสอบสิทธิ์ที่ปลอดภัย</h1>
        <div class="subtitle">เฉพาะบุคลากรที่ได้รับอนุญาตเท่านั้น</div>

        <input type="text" placeholder="รหัสประจำตัว">
        <input type="password" placeholder="รหัสผ่าน">

        <button>เข้าสู่ระบบ</button>

    </div>
</div>

<div class="footer">
การเข้าถึงโดยไม่ได้รับอนุญาตเป็นสิ่งต้องห้ามและอาจถูกตรวจสอบ
</div>

</div>

<script>
function updateTime(){
    const now=new Date();
    document.getElementById("datetime").innerText=
        now.toLocaleDateString()+" "+now.toLocaleTimeString();
}
setInterval(updateTime,1000);
updateTime();
</script>

</body>
</html>
