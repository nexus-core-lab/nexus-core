<script>
const correctCard = "LC-A01";
const correctPass = "Lc1993♧";

let attempts = 0;
let locked = false;
let hardLocked = false;

const card = document.getElementById("card");
const pass = document.getElementById("pass");
const btn = document.getElementById("loginBtn");
const msg = document.getElementById("msg");
const session = document.getElementById("session");

btn.addEventListener("click", authenticate);

function authenticate(){

    if(locked || hardLocked) return;

    msg.style.color = "#333";
    msg.innerText = "กำลังตรวจสอบข้อมูล...";
    btn.disabled = true;

    setTimeout(()=>{

        if(card.value === correctCard && pass.value === correctPass){

            const sessionID = "NC-" + Math.floor(Math.random()*1000000);
            session.innerText = "Session ID: " + sessionID;
            msg.style.color = "green";
            msg.innerText = "อนุญาตการเข้าใช้งาน";

            attempts = 0;

            setTimeout(()=>{
                window.location.href = "https://lin.ee/xbIaU45";
            },1200);

            return;
        }

        attempts++;
        pass.value="";

        if(attempts >= 9){
            activateHardLock();
        }
        else if(attempts >= 6){
            lockSystem(300, true); // 5 นาที + alert
        }
        else if(attempts >= 3){
            lockSystem(30, false);
        }
        else{
            msg.style.color = "#b00000";
            msg.innerText = "ยืนยันตัวตนล้มเหลว ("+attempts+"/9)";
            btn.disabled = false;
        }

    },1200);
}

function lockSystem(seconds, alertMode){

    locked = true;
    card.disabled = true;
    pass.disabled = true;

    let timeLeft = seconds;

    if(alertMode){
        msg.style.color = "#8B0000";
        msg.innerText = "SECURITY ALERT: ระบบถูกตรวจพบความพยายามผิดปกติ";
    }else{
        msg.style.color = "#b00000";
        msg.innerText = "ระบบถูกระงับชั่วคราว";
    }

    const timer = setInterval(()=>{
        timeLeft--;

        msg.innerText = 
        (alertMode ? 
        "SECURITY ALERT: โปรดลองอีกครั้งใน " : 
        "โปรดลองอีกครั้งใน ") 
        + timeLeft + " วินาที";

        if(timeLeft <= 0){
            clearInterval(timer);
            locked = false;
            card.disabled = false;
            pass.disabled = false;
            btn.disabled = false;
            msg.innerText = "";
        }

    },1000);
}

function activateHardLock(){

    hardLocked = true;

    msg.style.color = "#8B0000";
    msg.innerText = "บัญชีถูกระงับ กรุณาติดต่อผู้ดูแลระบบ";

    card.disabled = true;
    pass.disabled = true;
    btn.disabled = true;
}

function updateTime(){
    const now = new Date();
    document.getElementById("time").innerText =
        now.toLocaleDateString() + " " + now.toLocaleTimeString();
}

setInterval(updateTime,1000);
updateTime();
</script>
