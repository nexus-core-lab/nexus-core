<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Core System</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;

background:
radial-gradient(circle at 20% 20%, rgba(255,255,255,0.04), transparent 40%),
radial-gradient(circle at 80% 80%, rgba(255,255,255,0.03), transparent 40%),
linear-gradient(160deg,#0b2a3c,#082032);

height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.card{

background:white;
width:380px;
max-width:92%;
padding:42px;
border-radius:16px;

box-shadow:
0 10px 35px rgba(0,0,0,0.25);

text-align:center;
}

.logo{
width:90px;
margin-bottom:18px;
}

h2{
margin:8px 0;
letter-spacing:1px;
color:#445;
}

h3{
margin-top:0;
margin-bottom:25px;
font-weight:600;
}

input{

width:100%;
padding:14px;

margin:10px 0;

border-radius:8px;
border:1px solid #ccc;

font-size:15px;
}

button{

width:100%;
padding:14px;

margin-top:15px;

border:none;
border-radius:8px;

background:#2a3f5f;
color:white;

font-weight:bold;
letter-spacing:1px;

cursor:pointer;
}

button:hover{
background:#1f314a;
}

button:disabled{
background:#9ca3af;
cursor:not-allowed;
}

.notice{
margin-top:18px;
font-size:12px;
color:#666;
}

footer{
margin-top:12px;
font-size:12px;
color:#888;
}

#error{
color:#cc3333;
font-size:13px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<h2>NEXUS CORE SYSTEM</h2>
<h3>Secure Access Portal</h3>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button id="loginBtn" onclick="login()">SIGN IN</button>

<div id="error"></div>

<div class="notice">
Authorized personnel only. All access is logged and monitored.
</div>

<footer>
© 2025 Nexus Core<br>
System v2.4.1
</footer>

</div>

<script>

const correctUser="admin";
const correctPass="1234";

let attempts=localStorage.getItem("attempts") || 0;
let lockUntil=localStorage.getItem("lockUntil") || 0;

const btn=document.getElementById("loginBtn");
const error=document.getElementById("error");

function checkLock(){

const now=Date.now();

if(now<lockUntil){

btn.disabled=true;

let remaining=Math.ceil((lockUntil-now)/1000);

error.innerText="Security Lock Active — Retry in "+remaining+"s";

setTimeout(checkLock,1000);

}else{

btn.disabled=false;
error.innerText="";

localStorage.setItem("attempts",0);

}

}

checkLock();

function login(){

const user=document.getElementById("user").value;
const pass=document.getElementById("pass").value;

if(user===correctUser && pass===correctPass){

window.location.href="https://lin.ee/lGGma6p";

}else{

attempts++;

localStorage.setItem("attempts",attempts);

error.innerText="Invalid credentials";

if(attempts==3){

lock(30000);

}

if(attempts==6){

lock(90000);

}

if(attempts>=9){

lock(180000);

}

}

}

function lock(ms){

lockUntil=Date.now()+ms;

localStorage.setItem("lockUntil",lockUntil);

checkLock();

}

document.addEventListener("keydown",function(e){

if(e.key==="Enter"){
login();
}

});

</script>

</body>
</html>
