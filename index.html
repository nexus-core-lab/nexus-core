<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS CORE | Secure Authentication</title>

<style>
*{box-sizing:border-box}
body{
    margin:0;
    font-family:Segoe UI, Arial, sans-serif;
    background:#edf1f4;
    color:#1f2933;
}

/* ===== Header ===== */
.header{
    background:#1e2a34;
    color:#fff;
    padding:16px 28px;
    font-size:14px;
    letter-spacing:.5px;
    display:flex;
    justify-content:space-between;
}

/* ===== Layout ===== */
.main{
    min-height:calc(100vh - 60px);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
}

/* ===== Login Panel ===== */
.panel{
    width:100%;
    max-width:420px;
    background:#fff;
    padding:40px;
    border:1px solid #d5dce3;
}

.logo{
    width:70px;
    display:block;
    margin:0 auto 20px auto;
}

h1{
    font-size:18px;
    text-align:center;
    margin:0;
    font-weight:600;
}

.subtitle{
    text-align:center;
    font-size:13px;
    color:#6b7280;
    margin:8px 0 28px 0;
}

input{
    width:100%;
    padding:11px;
    margin-bottom:14px;
    border:1px solid #cbd5e1;
    font-size:14px;
}

input:focus{
    outline:none;
    border-color:#1e2a34;
}

button{
    width:100%;
    padding:11px;
    background:#1e2a34;
    color:#fff;
    border:none;
    font-size:14px;
    cursor:pointer;
}

button:hover{
    background:#111820;
}

#msg{
    margin-top:12px;
    font-size:12px;
    min-height:18px;
}

/* ===== Footer ===== */
.footer{
    text-align:center;
    font-size:11px;
    padding:14px;
    border-top:1px solid #d5dce3;
    background:#f5f7f9;
    color:#6b7280;
}
</style>
</head>

<body>

<div class="header">
    <div>NEXUS CORE</div>
    <div id="datetime"></div>
</div>

<div class="main">
<div class="panel">

<img src="logo.png" class="logo" alt="logo">

<h1>Secure Authentication</h1>
<div class="subtitle">Authorized Personnel Only</div>

<input type="text" id="card" placeholder="Identification Code">
<input type="password" id="pass" placeholder="Password">
<button id="loginBtn">Sign In</button>

<div id="msg"></div>

</div>
</div>

<div class="footer">
© 2026 NEXUS CORE. All access attempts are monitored.
</div>

<script>
document.addEventListener("DOMContentLoaded",function(){

const correctCard="LC-A01";
const correctPass="Lc1993♧";

let failCount=parseInt(localStorage.getItem("failCount"))||0;
let lockUntil=parseInt(localStorage.getItem("lockUntil"))||0;

const btn=document.getElementById("loginBtn");
const msg=document.getElementById("msg");

function updateTime(){
    const now=new Date();
    document.getElementById("datetime").innerText=
    now.toLocaleDateString()+" "+now.toLocaleTimeString();
}
setInterval(updateTime,1000);
updateTime();

function checkLock(){
    if(Date.now()<lockUntil){
        btn.disabled=true;
        let remaining=Math.ceil((lockUntil-Date.now())/1000);
        msg.style.color="red";
        msg.innerText="Account temporarily locked ("+remaining+"s)";
        setTimeout(checkLock,1000);
        return true;
    }
    btn.disabled=false;
    return false;
}
checkLock();

btn.addEventListener("click",function(){

if(checkLock()) return;

let card=document.getElementById("card").value.trim();
let pass=document.getElementById("pass").value.trim();

if(card===correctCard && pass===correctPass){
    msg.style.color="green";
    msg.innerText="Authentication successful";
    localStorage.removeItem("failCount");
    return;
}

failCount++;
localStorage.setItem("failCount",failCount);

msg.style.color="red";
msg.innerText="Invalid credentials";

if(failCount===3) lockUntil=Date.now()+30000;
if(failCount===6) lockUntil=Date.now()+60000;
if(failCount>=9) lockUntil=Date.now()+180000;

if(failCount>=3){
    localStorage.setItem("lockUntil",lockUntil);
    checkLock();
}

});

});
</script>

</body>
</html>
