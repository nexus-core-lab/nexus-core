<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS CORE | Secure Access</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Segoe UI',Tahoma,sans-serif;
  background:linear-gradient(145deg,#1b2735,#2c3e50);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#ffffff;
  width:340px;
  padding:40px 30px;
  border-radius:18px;
  box-shadow:0 20px 40px rgba(0,0,0,0.25);
  text-align:center;
}

.logo{
  font-size:22px;
  font-weight:700;
  letter-spacing:2px;
  margin-bottom:5px;
}

.sub{
  font-size:12px;
  color:#888;
  margin-bottom:25px;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:14px;
}

input:focus{
  outline:none;
  border-color:#2c3e50;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#2c3e50;
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#1b2735;
}

.error{
  color:#d63031;
  font-size:13px;
  margin-top:12px;
}
</style>
</head>
<body>

<div class="card">
  <div class="logo">NEXUS CORE</div>
  <div class="sub">Enterprise Secure Gateway</div>

  <input type="text" id="user" placeholder="Employee ID">
  <input type="password" id="pass" placeholder="Password">

  <button onclick="login()">Sign In</button>

  <div class="error" id="errorMsg"></div>
</div>

<script>
const correctUser="admin";
const correctPass="1234";

function login(){
  const user=document.getElementById("user").value;
  const pass=document.getElementById("pass").value;
  const error=document.getElementById("errorMsg");

  if(user===correctUser && pass===correctPass){
    localStorage.setItem("session","active");
    window.location.href="dashboard.html";
  }else{
    error.innerText="Authentication failed";
  }
}

window.onload=function(){
  if(localStorage.getItem("session")){
    window.location.href="dashboard.html";
  }
};
</script>

</body>
</html>
