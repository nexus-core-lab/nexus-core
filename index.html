<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Core System</title>

<link rel="icon" href="logo.png">

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

.login-card{
background:white;
width:350px;
padding:35px;
border-radius:14px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.logo{
width:80px;
margin-bottom:15px;
}

h1{
font-size:14px;
letter-spacing:2px;
color:#6b7280;
margin:0;
}

h2{
margin-top:5px;
margin-bottom:25px;
color:#1f2937;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #d1d5db;
font-size:14px;
}

button{
width:100%;
padding:13px;
border:none;
border-radius:8px;
background:#1f2937;
color:white;
font-weight:bold;
cursor:pointer;
}

button:disabled{
background:#9ca3af;
cursor:not-allowed;
}

#errorMsg{
margin-top:10px;
font-size:14px;
color:red;
}

.notice{
font-size:11px;
color:#6b7280;
margin-top:12px;
}

footer{
margin-top:20px;
font-size:11px;
color:#9ca3af;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-4px)}
50%{transform:translateX(4px)}
75%{transform:translateX(-4px)}
100%{transform:translateX(0)}
}

.shake{
animation:shake .3s;
}

</style>
</head>

<body>

<div class="login-card">

<img src="logo.png" class="logo">

<h1>NEXUS CORE SYSTEM</h1>
<h2>Secure Access Portal</h2>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button id="loginBtn">SIGN IN</button>

<div id="errorMsg"></div>

<p class="notice">
Authorized personnel only. All access attempts are monitored.
</p>

<footer>
© 2025 Nexus Core
</footer>

</div>

<script>

let attempts=parseInt(localStorage.getItem("attempts"))||0
let lockUntil=parseInt(localStorage.getItem("lockUntil"))||0

const btn=document.getElementById("loginBtn")
const error=document.getElementById("errorMsg")

function lock(duration){

lockUntil=Date.now()+duration
localStorage.setItem("lockUntil",lockUntil)

startCountdown()

}

function startCountdown(){

btn.disabled=true

let interval=setInterval(()=>{

let remaining=lockUntil-Date.now()

if(remaining<=0){

clearInterval(interval)

localStorage.removeItem("lockUntil")
localStorage.setItem("attempts",0)

attempts=0
btn.disabled=false
error.innerText=""

return
}

let sec=Math.ceil(remaining/1000)

error.innerText="Account locked. Try again in "+sec+"s"

},1000)

}

function login(){

if(Date.now()<lockUntil){
startCountdown()
return
}

btn.innerText="Authenticating..."
btn.disabled=true

setTimeout(()=>{

const user=document.getElementById("user").value
const pass=document.getElementById("pass").value

if(user==="admin" && pass==="1234"){

error.style.color="green"
error.innerText="Access Granted"

localStorage.setItem("session","true")

setTimeout(()=>{
window.location.href="dashboard.html"
},1000)

return
}

attempts++
localStorage.setItem("attempts",attempts)

document.querySelector(".login-card").classList.add("shake")
setTimeout(()=>{document.querySelector(".login-card").classList.remove("shake")},300)

if(attempts==3) lock(30000)
else if(attempts==6) lock(90000)
else if(attempts>=9) lock(180000)

error.style.color="red"
error.innerText="Invalid credentials"

btn.innerText="SIGN IN"
btn.disabled=false

},800)

}

btn.addEventListener("click",login)

window.onload=function(){

if(Date.now()<lockUntil){
startCountdown()
}

}

document.addEventListener("contextmenu",e=>e.preventDefault())

</script>

</body>
</html>
