<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบตรวจสอบสิทธิการเข้าใช้งาน</title>

<style>
body{
    margin:0;
    font-family:"Tahoma",sans-serif;
    background:#eef1f4;
}

/* แถบบน */
.topbar{
    background:#1f2e35;
    color:white;
    padding:8px 15px;
    font-size:13px;
    display:flex;
    justify-content:space-between;
}

/* กล่องกลาง */
.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:calc(100vh - 40px);
}

.card{
    background:white;
    width:340px;
    padding:30px;
    box-shadow:0 4px 20px rgba(0,0,0,0.15);
    text-align:center;
}

.logo{
    width:70px;
    margin-bottom:10px;
}

h2{
    margin:5px 0;
    font-size:18px;
}

.sub{
    font-size:12px;
    color:#555;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:6px 0;
    border:1px solid #bbb;
    font-size:14px;
}

button{
    width:100%;
    padding:10px;
    background:#2f4550;
    color:white;
    border:none;
    margin-top:10px;
    cursor:pointer;
    font-size:14px;
}

button:hover{
    background:#243740;
}

.notice{
    font-size:11px;
    color:#777;
    margin-top:15px;
}

.footer{
    background:#1f2e35;
    color:white;
    text-align:center;
    padding:8px;
    font-size:12px;
}
</style>
</head>

<body>

<div class="topbar">
    <div>ศูนย์ควบคุมสิทธิการเข้าใช้งาน</div>
    <div id="datetime"></div>
</div>

<div class="container">
<div class="card">

<img src="https://cdn-icons-png.flaticon.com/512/3064/3064197.png" class="logo">

<h2>ระบบตรวจสอบสิทธิการเข้าใช้งาน</h2>
<div class="sub">Access Control System</div>

<input type="text" id="card" placeholder="รหัสประจำตัวเจ้าหน้าที่">
<input type="password" id="pass" placeholder="รหัสผ่าน">
<button onclick="login()">เข้าสู่ระบบ</button>

<div class="notice">
การเข้าระบบโดยไม่ได้รับอนุญาต อาจมีความผิดตามกฎหมายที่เกี่ยวข้อง
</div>

</div>
</div>

<div class="footer">
© 2569 หน่วยงานกลางด้านความมั่นคงสารสนเทศ | เวอร์ชัน 1.0.4
</div>

<script>
const correctCard="LC-A01";
const correctPass="Lc1993♧";

let failCount=localStorage.getItem("failCount")?parseInt(localStorage.getItem("failCount")):0;
let lockUntil=localStorage.getItem("lockUntil")?parseInt(localStorage.getItem("lockUntil")):0;

function updateTime(){
    const now=new Date();
    document.getElementById("datetime").innerHTML=
    now.toLocaleDateString("th-TH")+" "+
    now.toLocaleTimeString("th-TH");
}
setInterval(updateTime,1000);
updateTime();

function login(){

    if(Date.now()<lockUntil){
        let sec=Math.ceil((lockUntil-Date.now())/1000);
        alert("ระบบถูกล็อก กรุณารอ "+sec+" วินาที");
        return;
    }

    let card=document.getElementById("card").value;
    let pass=document.getElementById("pass").value;

    if(card===correctCard && pass===correctPass){
        localStorage.setItem("failCount",0);
        alert("ยืนยันตัวตนสำเร็จ");
    }else{
        failCount++;
        localStorage.setItem("failCount",failCount);

        let lockTime=0;

        if(failCount==3) lockTime=10;
        if(failCount==6) lockTime=30;
        if(failCount>=9) lockTime=60;

        if(lockTime>0){
            lockUntil=Date.now()+(lockTime*1000);
            localStorage.setItem("lockUntil",lockUntil);
            alert("กรอกรหัสผิด ระบบล็อก "+lockTime+" วินาที");
        }else{
            alert("รหัสไม่ถูกต้อง");
        }
    }
}
</script>

</body>
</html>
