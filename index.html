<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Access</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: black;
    font-family: Arial, sans-serif;
    color: #00ffcc;
}

.container {
    text-align: center;
    background: rgba(0,0,0,0.9);
    padding: 40px;
    border: 2px solid #00ffcc;
    border-radius: 10px;
    box-shadow: 0 0 20px #00ffcc;
}

input {
    padding: 10px;
    width: 200px;
    margin-top: 15px;
    background: black;
    border: 1px solid #00ffcc;
    color: #00ffcc;
    text-align: center;
}

button {
    margin-top: 20px;
    padding: 10px 25px;
    background: #00ffcc;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: white;
}
</style>
</head>

<body>

<div class="container">
    <h2>SECURE ACCESS SYSTEM</h2>
    <input type="password" id="password" placeholder="ENTER ACCESS CODE">
    <br>
    <button onclick="login()">LOGIN</button>
    <p id="warning"></p>
</div>

<audio id="alarmSound" src="alarm.mp3" preload="auto"></audio>

<script>
let attempts = 0;

function login() {
    const password = document.getElementById("password").value;
    const alarm = document.getElementById("alarmSound");
    const warning = document.getElementById("warning");

    if (password === "1234") {
        window.location.href = "https://lin.ee/xbIaU45";
        return;
    }

    attempts++;
    alarm.currentTime = 0;
    alarm.play().catch(()=>{});

    if (attempts >= 3) {
        warning.innerHTML = "⚠ SECURITY ALERT ⚠<br>Unauthorized Access Detected";
        warning.style.color = "red";
    }
}
</script>

</body>
</html>
