<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Access</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at center, #111 0%, #000 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    color: white;
}

.container {
    background: rgba(0,0,0,0.85);
    padding: 40px;
    border-radius: 12px;
    text-align: center;
    width: 320px;
    box-shadow: 0 0 25px rgba(0,255,0,0.3);
}

.logo {
    width: 100px;
    margin-bottom: 20px;
}

h2 {
    margin-bottom: 20px;
    letter-spacing: 2px;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: none;
    outline: none;
    text-align: center;
    font-size: 18px;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 6px;
    border: none;
    background: #00aa00;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #00cc00;
}

.warning {
    margin-top: 10px;
    color: red;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
    <img src="logo.png" class="logo">
    <h2>SECURE LOGIN</h2>
    <input type="password" id="password" placeholder="Enter Access Code">
    <button onclick="login()">ACCESS</button>
    <div class="warning" id="warning"></div>
</div>

<audio id="alarmSound" src="alarm.mp3" preload="auto"></audio>

<script>
let attempts = 0;
const correctPassword = "1234";

function login() {
    const input = document.getElementById("password");
    const warning = document.getElementById("warning");
    const alarm = document.getElementById("alarmSound");

    if (input.value === correctPassword) {
        window.location.href = "https://lin.ee/xbIaU45";
        return;
    }

    attempts++;
    alarm.currentTime = 0;
    alarm.play().catch(()=>{});

    if (attempts >= 3) {
        warning.innerText = "⚠ SECURITY ALERT: Too Many Attempts";
    } else {
        warning.innerText = "Incorrect Code (" + attempts + "/3)";
    }

    input.value = "";
}
</script>

</body>
</html>
