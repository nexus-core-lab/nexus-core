<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Control</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#e9eef1;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.topbar{
    position:fixed;
    top:0;
    left:0;
    right:0;
    background:#23343c;
    color:white;
    padding:12px 20px;
    font-size:14px;
}

.card{
    background:white;
    width:90%;
    max-width:380px;
    padding:30px;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
    border-radius:6px;
}

.card img{
    width:60px;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    background:#2f4752;
    color:white;
    border:none;
    cursor:pointer;
    font-size:16px;
}

button:disabled{
    background:#999;
}

.error{
    color:red;
    font-size:14px;
    margin-top:10px;
}

.footer{
    font-size:12px;
    margin-top:15px;
    color:#666;
}
</style>
</head>
<body>

<div class="topbar">
ศูนย์ควบคุมสิทธิการเข้าใช้งาน
</div>

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/3064/3064155.png">
<h2>ระบบตรวจสอบสิทธิการเข้าใช้งาน</h2>
<p>Access Control System</p>

<input type="text" id="card" placeholder="รหัสประจำตัวเจ้าหน้าที่">
<input type="password" id="pass" placeholder="รหัสผ่าน">
<button onclick="login()" id="loginBtn">เข้าสู่ระบบ</button>

<div class="error" id="error"></div>

<div class="footer">
การเข้าสู่ระบบโดยไม่ได้รับอนุญาต อาจมีความผิดตามกฎหมายที่เกี่ยวข้อง
</div>
</div>

<noscript>
<h2 style="color:red;text-align:center;">ระบบต้องเปิด JavaScript</h2>
</noscript>

<script>
const correctCard="LC-A01";
const correctPass="Lc1993♧";

let attempts = localStorage.getItem("attempts") 
    ? parseInt(localStorage.getItem("attempts")) : 0;

let lockUntil = localStorage.getItem("lockUntil")
    ? parseInt(localStorage.getItem("lockUntil")) : 0;

const errorBox = document.getElementById("error");
const loginBtn = document.getElementById("loginBtn");

function checkLock(){
    if(Date.now() < lockUntil){
        loginBtn.disabled = true;
        let seconds = Math.floor((lockUntil - Date.now())/1000);
        errorBox.innerText = "ถูกล็อกระบบอีก " + seconds + " วินาที";
        setTimeout(checkLock,1000);
    }else{
        loginBtn.disabled = false;
        errorBox.innerText = "";
    }
}

function login(){
    const card = document.getElementById("card").value;
    const pass = document.getElementById("pass").value;

    if(Date.now() < lockUntil){
        return;
    }

    if(card === correctCard && pass === correctPass){
        alert("เข้าสู่ระบบสำเร็จ");
        attempts = 0;
        localStorage.removeItem("attempts");
        localStorage.removeItem("lockUntil");
    }else{
        attempts++;
        localStorage.setItem("attempts", attempts);

        let lockTime = 0;

        if(attempts >= 9){
            lockTime = 300;
        }else if(attempts >= 6){
            lockTime = 60;
        }else if(attempts >= 3){
            lockTime = 30;
        }

        if(lockTime > 0){
            lockUntil = Date.now() + lockTime*1000;
            localStorage.setItem("lockUntil", lockUntil);
        }

        errorBox.innerText = "รหัสไม่ถูกต้อง ("+attempts+" ครั้ง)";
        checkLock();
    }
}

checkLock();
</script>

</body>
</html>
