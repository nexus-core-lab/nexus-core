<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Core System</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#06242e,#0f4c5c);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.card{
background:#f5f6f7;
padding:35px;
width:340px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.4);
text-align:center;
}

.logo{
width:85px;
margin-bottom:15px;
}

.title{
font-size:22px;
font-weight:bold;
letter-spacing:2px;
color:#2b2b2b;
}

.subtitle{
color:#6d6d6d;
font-size:14px;
margin-bottom:15px;
}

.meta{
font-size:12px;
color:#7a7a7a;
margin-bottom:20px;
line-height:1.6;
}

input{
width:100%;
padding:12px;
margin:7px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:14px;
}

input:focus{
outline:none;
border-color:#2e3f55;
box-shadow:0 0 4px rgba(0,0,0,0.2);
}

button{
width:100%;
padding:13px;
margin-top:12px;
border:none;
border-radius:10px;
background:#394b63;
color:white;
font-weight:bold;
font-size:15px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#2f4056;
}

button:disabled{
background:#9aa3ad;
cursor:not-allowed;
}

.status{
font-size:12px;
margin-top:10px;
color:#666;
}

.console{
background:black;
color:#00ff6a;
font-family:monospace;
font-size:12px;
text-align:left;
padding:10px;
border-radius:10px;
margin-top:15px;
height:80px;
overflow:hidden;
}

.warning{
font-size:11px;
margin-top:15px;
color:#777;
}

</style>
</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<div class="title">NEXUS CORE SYSTEM</div>
<div class="subtitle">Secure Access Portal</div>

<div class="meta">
SYSTEM ID: NX-CORE-771A<br>
SECURITY LEVEL: OMEGA<br>
NETWORK NODE: GLOBAL GRID
</div>

<input id="user" placeholder="รหัสผู้ใช้">
<input id="pass" type="password" placeholder="รหัสผ่าน">

<button id="loginBtn" onclick="login()">เข้าสู่ระบบ</button>

<div class="status" id="status">
สถานะระบบ: ออนไลน์ | การเข้ารหัส: AES-256
</div>

<div class="console" id="console">
[ระบบ] nexus core เริ่มทำงานแล้ว<br>
</div>

<div class="warning">
คำเตือน: เฉพาะบุคลากรที่ได้รับอนุญาตเท่านั้น<br>
กิจกรรมทั้งหมดจะถูกตรวจสอบ<br>
© 2025 Nexus Core Systems
</div>

</div>

<script>

const ADMIN_ID="admin"
const ADMIN_PASS="1234"
const LINE_URL="https://lin.ee/lGGma6p"

let lockUntil = localStorage.getItem("lockUntil") || 0

const btn=document.getElementById("loginBtn")
const user=document.getElementById("user")
const pass=document.getElementById("pass")
const consoleBox=document.getElementById("console")
const status=document.getElementById("status")

function log(text){
consoleBox.innerHTML += text+"<br>"
consoleBox.scrollTop=consoleBox.scrollHeight
}

function checkLock(){

let now=Date.now()

if(lockUntil>now){

btn.disabled=true
user.disabled=true
pass.disabled=true

startCountdown()

}

}

function startCountdown(){

let timer=setInterval(()=>{

let now=Date.now()
let remain=Math.floor((lockUntil-now)/1000)

if(remain<=0){

clearInterval(timer)

btn.disabled=false
user.disabled=false
pass.disabled=false

status.innerHTML="สถานะระบบ: ออนไลน์ | การเข้ารหัส: AES-256"
localStorage.removeItem("lockUntil")

log("[ระบบ] ปลดล็อคการเข้าสู่ระบบ")

return
}

status.innerHTML="ล็อคความปลอดภัย "+remain+" วินาที"

},1000)

}

function login(){

let id=user.value
let pw=pass.value

log("[AUTH] ตรวจสอบข้อมูลผู้ใช้")

if(id===ADMIN_ID && pw===ADMIN_PASS){

log("[AUTH] ยืนยันตัวตนสำเร็จ")
log("[NODE] กำลังเชื่อมต่อระบบ")

setTimeout(()=>{
window.location.href=LINE_URL
},800)

return

}

log("[SECURITY] รหัสไม่ถูกต้อง")

lockUntil=Date.now()+30000
localStorage.setItem("lockUntil",lockUntil)

checkLock()

}

checkLock()

log("[NODE] เชื่อมต่อเครือข่ายสำเร็จ")
log("[SECURITY] encryption module loaded")
log("[SYSTEM] awaiting credentials")

</script>

</body>
</html>
