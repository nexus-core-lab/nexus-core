<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS Secure</title>

<style>
body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:#dcdcdc;
}
.topbar{
    background:#000;
    color:#fff;
    padding:10px 15px;
    display:flex;
    justify-content:space-between;
    font-size:14px;
}
.container{
    max-width:500px;
    margin:50px auto;
    background:#f4f4f4;
    padding:45px 35px;
    text-align:center;
    box-shadow:0 3px 15px rgba(0,0,0,0.25);
}
.logo{
    width:110px;
    margin-bottom:25px;
}
input{
    width:100%;
    padding:14px;
    margin:12px 0;
    border:2px solid #888;
    background:#e9e9e9;
}
button{
    width:100%;
    padding:14px;
    background:#6f6f6f;
    color:white;
    border:none;
}
#msg{
    margin-top:15px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="topbar">
    <div>เครือข่ายภายในที่ปลอดภัย</div>
    <div id="datetime"></div>
</div>

<div class="container">
    <img src="logo.png" class="logo">

    <h2>ระบบสารสนเทศหลัก NEXUS</h2>
    <p>เฉพาะผู้ได้รับอนุญาตระดับ 3 เท่านั้น</p>

    <input type="text" id="card" placeholder="รหัสบัตร">
    <input type="password" id="pass" placeholder="รหัสผ่าน">

    <button id="loginBtn">ยืนยันตัวตน</button>

    <div id="msg"></div>
</div>

<script>

document.addEventListener("DOMContentLoaded",function(){

const correctCard="LC-A01";
const correctPass="Lc1993♧";

let failCount=parseInt(localStorage.getItem("failCount"))||0;
let lockUntil=parseInt(localStorage.getItem("lockUntil"))||0;

const btn=document.getElementById("loginBtn");
const msg=document.getElementById("msg");
const cardInput=document.getElementById("card");
const passInput=document.getElementById("pass");

function updateTime(){
    const now=new Date();
    document.getElementById("datetime").innerText=
    now.toLocaleDateString()+" "+now.toLocaleTimeString();
}
setInterval(updateTime,1000);
updateTime();

function checkLock(){
    if(Date.now()<lockUntil){
        btn.disabled=true;
        cardInput.disabled=true;
        passInput.disabled=true;
        msg.style.color="red";
        msg.innerText="ระบบล็อกอยู่";
    }else{
        btn.disabled=false;
        cardInput.disabled=false;
        passInput.disabled=false;
    }
}
checkLock();

btn.addEventListener("click",function(){

    if(Date.now()<lockUntil) return;

    if(cardInput.value.trim()===correctCard &&
       passInput.value.trim()===correctPass){

        msg.style.color="green";
        msg.innerText="เข้าสู่ระบบสำเร็จ";
        failCount=0;
        localStorage.removeItem("failCount");
        return;
    }

    failCount++;
    localStorage.setItem("failCount",failCount);

    msg.style.color="red";
    msg.innerText="ข้อมูลไม่ถูกต้อง";

    if(failCount>=3){
        lockUntil=Date.now()+30000;
        localStorage.setItem("lockUntil",lockUntil);
        checkLock();
    }

});

});

</script>

</body>
</html>
