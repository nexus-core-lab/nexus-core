<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Core System</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#0b3a45;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

.login-box{
background:white;
padding:30px;
width:300px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:5px;
font-size:18px;
}

p{
font-size:12px;
color:#555;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#2d3e50;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:disabled{
background:#999;
cursor:not-allowed;
}

.status{
margin-top:10px;
font-size:12px;
color:red;
}

.footer{
margin-top:15px;
font-size:10px;
color:#777;
}

.loading{
color:#333;
}

</style>
</head>

<body>

<div class="login-box">

<h2>NEXUS CORE SYSTEM</h2>
<p>Secure Access Portal</p>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button id="loginBtn" onclick="login()">SIGN IN</button>

<div class="status" id="status"></div>

<div class="footer">
Authorized personnel only. All access is logged and monitored.<br>
© 2025 Nexus Core Systems<br>
Internal Access Gateway v2.4.1
</div>

</div>

<script>

let failCount = localStorage.getItem("failCount") || 0
let lockUntil = localStorage.getItem("lockUntil") || 0

function updateLock(){

let now = Date.now()

if(now < lockUntil){

let sec = Math.ceil((lockUntil-now)/1000)

document.getElementById("loginBtn").disabled = true
document.getElementById("status").innerText =
"Security Lock Active — Retry in "+sec+"s"

setTimeout(updateLock,1000)

}else{

document.getElementById("loginBtn").disabled = false
document.getElementById("status").innerText = ""

}

}

function login(){

let user = document.getElementById("user").value
let pass = document.getElementById("pass").value

document.getElementById("status").innerHTML =
"<span class='loading'>Authenticating...</span>"

setTimeout(function(){

if(user==="admin" && pass==="1234"){

localStorage.removeItem("failCount")
localStorage.removeItem("lockUntil")

window.location.href="https://lin.ee/lGGma6p"

}else{

failCount++
localStorage.setItem("failCount",failCount)

document.getElementById("status").innerText =
"Authentication failed. Invalid credentials."

if(failCount==3){

lockUntil = Date.now()+30000

}

if(failCount==6){

lockUntil = Date.now()+90000

}

if(failCount>=9){

lockUntil = Date.now()+180000

}

localStorage.setItem("lockUntil",lockUntil)

updateLock()

}

},1200)

}

updateLock()

</script>

</body>
</html>
