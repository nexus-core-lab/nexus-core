<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS CORE</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    font-family:Arial, Helvetica, sans-serif;
    color:#fff;
}

.topbar{
    background:#000;
    padding:10px 15px;
    font-size:13px;
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #333;
}

.container{
    max-width:420px;
    margin:80px auto;
    background:#1a1a1a;
    padding:30px;
    border:1px solid #333;
}

.logo{
    text-align:center;
    margin-bottom:20px;
}

.logo img{
    width:90px;
}

h3{
    text-align:center;
    margin-bottom:25px;
    font-weight:normal;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    background:#111;
    border:1px solid #444;
    color:#fff;
}

button{
    width:100%;
    padding:12px;
    background:#000;
    color:#fff;
    border:1px solid #555;
    cursor:pointer;
}

.message{
    margin-top:15px;
    font-size:14px;
    min-height:20px;
}
</style>
</head>

<body>

<div class="topbar">
    <div>INTERNAL SECURE NETWORK</div>
    <div id="time"></div>
</div>

<div class="container">

    <div class="logo">
        <img src="logo.png">
    </div>

    <h3>IDENTITY VERIFICATION</h3>

    <input type="text" id="card" placeholder="Card ID">
    <input type="password" id="pass" placeholder="Password">
    <button id="loginBtn">Authenticate</button>

    <div class="message" id="msg"></div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

const correctCard = "LC-A01";
const correctPass = "Lc1993♧";

let attempts = 0;
let locked = false;

const card = document.getElementById("card");
const pass = document.getElementById("pass");
const btn = document.getElementById("loginBtn");
const msg = document.getElementById("msg");

btn.onclick = function(){

    if(locked) return;

    msg.innerText="Verifying...";
    btn.disabled=true;

    setTimeout(function(){

        if(card.value === correctCard && pass.value === correctPass){
            msg.style.color="lime";
            msg.innerText="ACCESS GRANTED";
            return;
        }

        attempts++;

        if(attempts >= 3){
            locked=true;
            msg.style.color="red";
            msg.innerText="SYSTEM LOCKED 30s";
            setTimeout(function(){
                locked=false;
                attempts=0;
                msg.innerText="";
                btn.disabled=false;
            },30000);
            return;
        }

        msg.style.color="red";
        msg.innerText="ACCESS DENIED ("+attempts+"/3)";
        btn.disabled=false;
        pass.value="";

    },1000);
};

});
</script>

</body>
</html>
