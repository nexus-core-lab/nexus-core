<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS CORE - Secure Terminal</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: radial-gradient(circle at center, #081424 0%, #02060d 100%);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#e0e6ed;
}

.container{
    width:92%;
    max-width:400px;
    background:#0d1b2a;
    padding:35px;
    border-radius:14px;
    box-shadow:0 0 60px rgba(0,0,0,0.9);
    border:1px solid rgba(255,215,0,0.4);
    text-align:center;
}

.logo{
    width:95px;
    margin-bottom:15px;
    filter: drop-shadow(0 0 10px rgba(255,215,0,0.6));
}

h1{
    margin:8px 0 5px 0;
    letter-spacing:3px;
    font-weight:600;
}

.subtitle{
    font-size:12px;
    opacity:0.65;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:13px;
    margin:12px 0;
    border-radius:8px;
    border:1px solid #1f3a5a;
    background:#081625;
    color:white;
    font-size:14px;
    transition:0.3s;
}

input:focus{
    outline:none;
    border-color:gold;
    box-shadow:0 0 6px rgba(255,215,0,0.6);
}

button{
    width:100%;
    padding:14px;
    background:linear-gradient(90deg,#b8860b,#ffd700);
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    margin-top:15px;
    letter-spacing:1px;
}

button:hover{
    opacity:0.9;
}

.message{
    margin-top:12px;
    font-size:13px;
    color:#ff4d4d;
    min-height:18px;
}

.footer{
    font-size:11px;
    opacity:0.5;
    margin-top:20px;
}

.locked{
    background:black;
    color:red;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:monospace;
    text-align:center;
}
</style>
</head>

<body>

<div class="container">
    <img src="logo.png" class="logo">
    <h1>NEXUS CORE</h1>
    <div class="subtitle">High Security Intelligence Network</div>

    <input id="username" type="text" placeholder="Agent ID">
    <input id="password" type="password" placeholder="Access Code">

    <button onclick="login()">AUTHORIZED ACCESS</button>

    <div id="msg" class="message"></div>

    <div class="footer">
        CLASSIFIED SYSTEM<br>
        Unauthorized access will be logged.
    </div>
</div>

<script>
let attempts = 0;

function login(){

    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();
    const msg = document.getElementById("msg");

    const correctUser = "admin";
    const correctPass = "1234";

    if(user === correctUser && pass === correctPass){
        window.location.href = "https://lin.ee/xbIaU45";
    }
    else{
        attempts++;

        if(attempts >= 3){
            document.body.innerHTML = `
                <div class="locked">
                    <h1>⚠ SECURITY BREACH DETECTED ⚠</h1>
                    <p>Terminal locked due to repeated failed attempts.</p>
                    <p>Access permanently suspended.</p>
                </div>
            `;
        }else{
            msg.innerText = "Access denied (" + attempts + "/3)";
        }
    }
}
</script>

</body>
</html>
