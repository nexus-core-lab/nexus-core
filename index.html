<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Core System</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#052c33,#0c4a52);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.card{
background:#ffffff;
padding:35px;
width:340px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.35);
text-align:center;
}

.logo{
width:80px;
margin-bottom:10px;
}

.title{
font-size:22px;
font-weight:bold;
letter-spacing:2px;
color:#222;
}

.subtitle{
font-size:15px;
color:#666;
margin-bottom:18px;
}

.info{
font-size:13px;
color:#777;
line-height:1.6;
margin-bottom:18px;
}

input{
width:100%;
padding:12px;
margin:7px 0;
border-radius:10px;
border:1px solid #ddd;
font-size:14px;
}

button{
width:100%;
padding:13px;
margin-top:10px;
border:none;
border-radius:10px;
background:#394b63;
color:white;
font-size:14px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#2d3d52;
}

button:disabled{
background:#9aa3ad;
cursor:not-allowed;
}

#message{
margin-top:10px;
font-size:13px;
color:red;
}

.system{
margin-top:15px;
font-size:12px;
color:#666;
}

.footer{
font-size:11px;
margin-top:18px;
color:#777;
line-height:1.4;
}

</style>
</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<div class="title">NEXUS CORE SYSTEM</div>
<div class="subtitle">Secure Access Portal</div>

<div class="info">
SYSTEM ID: NX-CORE-771A<br>
SECURITY LEVEL: OMEGA<br>
NETWORK NODE: GLOBAL GRID
</div>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button id="loginBtn" onclick="login()">SIGN IN</button>

<div id="message"></div>

<div class="system">
SYSTEM STATUS: ONLINE<br>
ENCRYPTION: AES-256
</div>

<div class="footer">
WARNING: This system is restricted to authorized personnel only.<br>
All access is logged and monitored.<br>
© 2025 Nexus Core Systems
</div>

</div>

<script>

const ADMIN_ID="admin"
const ADMIN_PASS="1234"
const LINE_URL="https://lin.ee/lGGma6p"

let lockUntil = localStorage.getItem("lockUntil") || 0

const msg=document.getElementById("message")
const btn=document.getElementById("loginBtn")

function checkLock(){

let now=Date.now()

if(lockUntil>now){

let seconds=Math.ceil((lockUntil-now)/1000)

btn.disabled=true
msg.innerText="Access locked. Try again in "+seconds+" sec"

setTimeout(checkLock,1000)

}else{

btn.disabled=false
msg.innerText=""

}

}

function login(){

let user=document.getElementById("user").value
let pass=document.getElementById("pass").value

if(user===ADMIN_ID && pass===ADMIN_PASS){

window.location.href=LINE_URL

}else{

lockUntil=Date.now()+30000
localStorage.setItem("lockUntil",lockUntil)

msg.innerText="Access denied"

checkLock()

}

}

checkLock()

</script>

</body>
</html>
