<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Core System</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0a3c4b,#062a35);
}

.card{
width:340px;
background:#fff;
border-radius:18px;
padding:35px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.logo{
width:70px;
margin-bottom:10px;
}

h1{
font-size:20px;
margin:5px 0;
letter-spacing:1px;
}

.sub{
color:#555;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1.4px solid #cfd4da;
font-size:14px;
}

button{
width:100%;
padding:13px;
margin-top:10px;
border:none;
border-radius:10px;
background:#24394a;
color:#fff;
font-weight:600;
cursor:pointer;
}

button:disabled{
background:#9ca3af;
cursor:not-allowed;
}

.lock{
color:#c0392b;
margin-top:10px;
font-size:14px;
}

.footer{
margin-top:18px;
font-size:12px;
color:#666;
}

.version{
font-size:11px;
color:#888;
margin-top:5px;
}

</style>
</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<h1>NEXUS CORE SYSTEM</h1>
<div class="sub">Secure Access Portal</div>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button id="loginBtn">SIGN IN</button>

<div id="msg" class="lock"></div>

<div class="footer">
Authorized personnel only. All access is logged and monitored.
</div>

<div class="version">
© 2025 Nexus Core Systems<br>
Internal Access Gateway v2.4.1
</div>

</div>

<script>

const correctUser="admin";
const correctPass="1234";

let attempts=0;
let lockUntil=0;

const btn=document.getElementById("loginBtn");
const msg=document.getElementById("msg");

btn.onclick=function(){

const now=Date.now();

if(now<lockUntil){
return;
}

const u=document.getElementById("user").value;
const p=document.getElementById("pass").value;

if(u===correctUser && p===correctPass){

msg.style.color="green";
msg.innerText="Access Granted";

setTimeout(()=>{
window.location.href="https://lin.ee/lGGma6p";
},1200);

return;

}else{

attempts++;

if(attempts===3){
lock(30);
}
else if(attempts===6){
lock(90);
}
else if(attempts>=9){
lock(180);
}
else{
msg.innerText="Invalid credentials";
}

}

}

function lock(sec){

lockUntil=Date.now()+sec*1000;

btn.disabled=true;

updateLock();

}

function updateLock(){

const now=Date.now();

if(now>=lockUntil){

btn.disabled=false;
msg.innerText="";
return;

}

const remain=Math.ceil((lockUntil-now)/1000);

msg.innerText="Security Lock Active — Retry in "+remain+"s";

setTimeout(updateLock,1000);

}

document.addEventListener("keydown",function(e){
if(e.key==="Enter"){
btn.click();
}
});

</script>

</body>
</html>
