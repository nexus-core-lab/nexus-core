<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Core | Secure Access</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:#f4f6f8;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:#ffffff;
  width:100%;
  max-width:360px;
  padding:40px 30px;
  border-radius:8px;
  box-shadow:0 8px 24px rgba(0,0,0,0.08);
  text-align:center;
}

.logo{
  width:90px;
  margin-bottom:10px;
}

.company{
  font-size:13px;
  letter-spacing:2px;
  color:#6b7280;
  margin-bottom:5px;
}

h1{
  font-size:18px;
  margin:0 0 25px 0;
  color:#1f2937;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:1px solid #d1d5db;
  border-radius:6px;
  font-size:14px;
  background:#fff;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:6px;
  background:#1f2937;
  color:#ffffff;
  font-weight:600;
  cursor:pointer;
}

button:disabled{
  background:#9ca3af;
  cursor:not-allowed;
}

.message{
  font-size:13px;
  margin-top:10px;
  color:#dc2626;
}

.footer{
  margin-top:25px;
  font-size:11px;
  color:#6b7280;
}
</style>
</head>

<body>

<div class="container">

  <!-- แก้โลโก้ตรงนี้ให้ตรงชื่อไฟล์จริง -->
  <img src="logo.png" class="logo" alt="Logo">

  <div class="company">NEXUS CORE SYSTEM</div>
  <h1>Secure Access Portal</h1>

  <input type="text" id="user">
  <input type="password" id="pass">

  <button onclick="login()" id="loginBtn">SIGN IN</button>

  <div class="message" id="msg"></div>

  <div class="footer">
    © 2025 Nexus Core. All rights reserved.
  </div>

</div>

<script>
const correctUser="LC-A01";
const correctPass="Lc1993♧";

let attempts = parseInt(localStorage.getItem("attempts")) || 0;
let lockUntil = parseInt(localStorage.getItem("lockUntil")) || 0;

const btn = document.getElementById("loginBtn");
const msg = document.getElementById("msg");

function checkLock(){
    if(Date.now() < lockUntil){
        let remaining = Math.ceil((lockUntil - Date.now())/1000);
        btn.disabled = true;
        msg.innerText = "Account locked. Try again in " + remaining + " sec";
        setTimeout(checkLock,1000);
    }else{
        btn.disabled = false;
        msg.innerText = "";
        localStorage.removeItem("lockUntil");
    }
}

function login(){
    if(Date.now() < lockUntil){
        return;
    }

    const user = document.getElementById("user").value;
    const pass = document.getElementById("pass").value;

    if(user===correctUser && pass===correctPass){
        attempts=0;
        localStorage.removeItem("attempts");
        alert("Access Granted");
    }else{
        attempts++;
        localStorage.setItem("attempts",attempts);

        let lockTime=0;

        if(attempts===3) lockTime=30;
        if(attempts===6) lockTime=90;
        if(attempts===9) lockTime=180;

        if(lockTime>0){
            lockUntil=Date.now()+lockTime*1000;
            localStorage.setItem("lockUntil",lockUntil);
            checkLock();
        }else{
            msg.innerText="Invalid credentials ("+attempts+"/9)";
        }
    }
}

checkLock();
</script>

</body>
</html>
