<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Core System</title>

<link rel="icon" href="logo.png">

<style>

body{
font-family:system-ui;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

.card{
background:white;
width:360px;
padding:40px;
border-radius:16px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,.3);
}

.logo{
width:85px;
margin-bottom:15px;
}

.titleSmall{
letter-spacing:2px;
font-size:13px;
color:#6b7280;
}

.titleBig{
font-size:22px;
margin-bottom:25px;
font-weight:600;
color:#111827;
}

input{
width:100%;
padding:12px;
margin-bottom:14px;
border-radius:8px;
border:1px solid #d1d5db;
font-size:14px;
}

button{
width:100%;
padding:13px;
border:none;
border-radius:8px;
background:#1f2937;
color:white;
font-weight:600;
cursor:pointer;
}

button:disabled{
background:#9ca3af;
cursor:not-allowed;
}

#error{
color:red;
font-size:14px;
margin-top:10px;
}

footer{
margin-top:20px;
font-size:11px;
color:#9ca3af;
}

.shake{
animation:shake .3s;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-4px)}
50%{transform:translateX(4px)}
75%{transform:translateX(-4px)}
100%{transform:translateX(0)}
}

</style>

</head>

<body>

<div class="card" id="card">

<img src="logo.png" class="logo">

<div class="titleSmall">NEXUS CORE SYSTEM</div>
<div class="titleBig">Secure Access Portal</div>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button id="loginBtn" onclick="login()">SIGN IN</button>

<div id="error"></div>

<footer>
© 2025 Nexus Core
</footer>

</div>

<script>

let attempts = Number(localStorage.getItem("attempts")) || 0
let lockUntil = Number(localStorage.getItem("lockUntil")) || 0

const btn = document.getElementById("loginBtn")
const error = document.getElementById("error")

function checkLock(){

let now = Date.now()

if(now < lockUntil){

let seconds = Math.ceil((lockUntil-now)/1000)

btn.disabled=true
error.innerHTML="Account locked. Try again in "+seconds+"s"

setTimeout(checkLock,1000)

return true
}

btn.disabled=false
error.innerHTML=""
return false
}

checkLock()

function login(){

if(checkLock()) return

let user=document.getElementById("user").value
let pass=document.getElementById("pass").value

// ตัวอย่างบัญชี
if(user==="admin" && pass==="1234"){

alert("Login Success")

attempts=0
localStorage.setItem("attempts",0)

return
}

attempts++

localStorage.setItem("attempts",attempts)

document.getElementById("card").classList.add("shake")

setTimeout(()=>{
document.getElementById("card").classList.remove("shake")
},300)

let lockTime=0

if(attempts>=9) lockTime=180
else if(attempts>=6) lockTime=90
else if(attempts>=3) lockTime=30

if(lockTime>0){

lockUntil=Date.now()+lockTime*1000

localStorage.setItem("lockUntil",lockUntil)

}

checkLock()

}

</script>

</body>
</html>
