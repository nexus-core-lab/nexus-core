<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Core System</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#0f4c54;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.card{
background:white;
padding:40px;
border-radius:20px;
width:320px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

.logo{
width:90px;
margin-bottom:15px;
}

h2{
margin:10px 0;
letter-spacing:2px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:15px;
}

button{
width:100%;
padding:13px;
border:none;
border-radius:10px;
background:#24364b;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1b2a3a;
}

.msg{
margin-top:12px;
color:red;
font-size:14px;
}

.footer{
margin-top:20px;
font-size:12px;
color:#777;
}

</style>

</head>
<body>

<div class="card">

<img class="logo" src="logo.png">

<h2>NEXUS CORE SYSTEM</h2>
<div>Secure Access Portal</div>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">SIGN IN</button>

<div id="msg" class="msg"></div>

<div class="footer">
Authorized personnel only.  
All access is logged and monitored.  
<br>
© 2025 Nexus Core Systems
</div>

</div>

<script>

/* AUTO LOGIN (NO REFRESH) */

if(localStorage.getItem("access")=="true"){
location.href="https://lin.ee/lGGma6p"
}

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u==="admin" && p==="1234"){

localStorage.setItem("access","true")

location.href="https://lin.ee/lGGma6p"

}else{

document.getElementById("msg").innerText="Invalid access credentials"

}

}

/* ENTER LOGIN */

document.addEventListener("keydown",function(e){

if(e.key==="Enter"){
login()
}

})

/* DISABLE RIGHT CLICK */

document.addEventListener("contextmenu",e=>e.preventDefault())

</script>

</body>
</html>
