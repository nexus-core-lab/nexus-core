<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Core System</title>

<style>

body{
    margin:0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg,#0c3b46,#0a2d36);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* Login Card */

.login-box{
    background:#ffffff;
    width:360px;
    padding:40px 35px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

/* Logo */

.logo{
    width:95px;
    height:95px;
    margin-bottom:15px;
    filter:drop-shadow(0 3px 6px rgba(0,0,0,0.2));
}

/* Title */

.title{
    font-size:22px;
    font-weight:700;
    letter-spacing:1px;
    color:#1b1b1b;
}

.subtitle{
    font-size:14px;
    color:#666;
    margin-bottom:25px;
}

/* Input */

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:6px;
    border:1px solid #d2d2d2;
    font-size:14px;
}

/* Button */

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#2f3e4f;
    border:none;
    border-radius:6px;
    color:white;
    font-weight:600;
    cursor:pointer;
}

button:hover{
    background:#24313f;
}

.message{
    margin-top:15px;
    font-size:13px;
    color:#b00020;
}

/* Footer */

.footer{
    margin-top:15px;
    font-size:11px;
    color:#777;
}

</style>
</head>

<body>

<div class="login-box">

<img src="logo.png" class="logo">

<div class="title">NEXUS CORE SYSTEM</div>
<div class="subtitle">Secure Access Portal</div>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">SIGN IN</button>

<div class="message" id="msg"></div>

<div class="footer">
Authorized personnel only. All access is logged and monitored.<br>
© 2025 Nexus Core Systems<br>
Internal Access Gateway v2.4.1
</div>

</div>

<script>

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u==="admin" && p==="1234"){
    
    window.location.href="https://lin.ee/lGGma6p"

}else{

document.getElementById("msg").innerText="Access Denied"

}

}

</script>

</body>
</html>
