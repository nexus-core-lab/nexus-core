<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS CORE - Access Control</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI, sans-serif;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.container{
width:100%;
max-width:400px;
padding:20px;
}

.card{
background:#fff;
border-radius:14px;
padding:35px 25px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
text-align:center;
}

.logo{
font-size:22px;
font-weight:bold;
color:#203a43;
margin-bottom:10px;
}

.subtitle{
color:#555;
font-size:14px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:6px;
background:#203a43;
color:white;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#162d38;
}

button:disabled{
background:#888;
cursor:not-allowed;
}

.error{
color:red;
font-size:13px;
margin-top:10px;
min-height:18px;
}

.lock{
color:#b30000;
font-weight:bold;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">
<div class="logo">NEXUS CORE</div>
<div class="subtitle">Access Control System</div>

<input type="text" id="card" placeholder="รหัสประจำตัวเจ้าหน้าที่">
<input type="password" id="pass" placeholder="รหัสผ่าน">
<button id="loginBtn" onclick="login()">เข้าสู่ระบบ</button>

<div class="error" id="errorMsg"></div>
<div class="lock" id="lockMsg"></div>

</div>
</div>

<script>
const correctCard="LC-A01";
const correctPass="Lc1993♧";

let failCount = Number(sessionStorage.getItem("failCount")) || 0;
let lockUntil = Number(sessionStorage.getItem("lockUntil")) || 0;

function checkLock(){
    if(Date.now() < lockUntil){
        let remain = Math.ceil((lockUntil - Date.now())/1000);
        document.getElementById("loginBtn").disabled=true;
        document.getElementById("lockMsg").innerText=
        "บัญชีถูกล็อก กรุณารอ "+remain+" วินาที";
        setTimeout(checkLock,1000);
    }else{
        document.getElementById("loginBtn").disabled=false;
        document.getElementById("lockMsg").innerText="";
    }
}

function login(){

    if(Date.now() < lockUntil){
        return;
    }

    const card=document.getElementById("card").value.trim();
    const pass=document.getElementById("pass").value.trim();
    const error=document.getElementById("errorMsg");

    if(card===correctCard && pass===correctPass){
        error.style.color="green";
        error.innerText="ยืนยันตัวตนสำเร็จ";
        failCount=0;
        sessionStorage.setItem("failCount",0);
        setTimeout(()=>{
            document.body.innerHTML="<h1 style='color:white;text-align:center;margin-top:20%;'>ACCESS GRANTED</h1>";
        },1000);
    }else{
        failCount++;
        sessionStorage.setItem("failCount",failCount);

        error.style.color="red";
        error.innerText="รหัสไม่ถูกต้อง ("+failCount+" ครั้ง)";

        if(failCount===3){
            lock(30);
        }
        else if(failCount===6){
            lock(300);
        }
        else if(failCount===9){
            lock(1800);
        }
    }
}

function lock(seconds){
    lockUntil = Date.now() + seconds*1000;
    sessionStorage.setItem("lockUntil",lockUntil);
    checkLock();
}

checkLock();
</script>

</body>
</html>
