<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Core System</title>

<style>

*{
box-sizing:border-box;
font-family:Segoe UI,Roboto,sans-serif;
}

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0c2d33,#0f4c5c);
}

.container{
width:380px;
background:#fff;
border-radius:18px;
padding:40px 35px;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
text-align:center;
}

.logo{
width:70px;
margin-bottom:10px;
}

h1{
margin:10px 0 4px;
font-size:24px;
letter-spacing:2px;
}

.subtitle{
color:#666;
font-size:14px;
margin-bottom:25px;
}

.systeminfo{
font-size:13px;
color:#777;
margin-bottom:25px;
line-height:1.6;
}

input{
width:100%;
padding:14px;
margin:8px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:15px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#394a59;
color:#fff;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#2c3a46;
}

.status{
margin-top:15px;
font-size:13px;
color:#666;
}

.error{
color:#c0392b;
margin-top:10px;
font-size:14px;
}

.lock{
color:#e67e22;
}

.footer{
margin-top:25px;
font-size:12px;
color:#777;
}

.toggle{
position:absolute;
right:15px;
top:14px;
cursor:pointer;
}

.passwordbox{
position:relative;
}

</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>NEXUS CORE SYSTEM</h1>
<div class="subtitle">Secure Access Portal</div>

<div class="systeminfo">
SYSTEM ID: NX-CORE-771A<br>
SECURITY LEVEL: OMEGA<br>
NETWORK NODE: GLOBAL GRID
</div>

<input id="user" placeholder="User ID">

<div class="passwordbox">
<input id="pass" type="password" placeholder="Password">
<span class="toggle" onclick="togglePass()">👁</span>
</div>

<button onclick="login()">SIGN IN</button>

<div class="status">
System Status: ONLINE | Encryption: AES-256
</div>

<div id="msg" class="error"></div>

<div class="footer">
Authorized personnel only.<br>
All access attempts are logged.<br>
© 2025 Nexus Core Systems
</div>

</div>

<script>

let correctUser="admin"
let correctPass="nexus771"

let attempts=0
let locked=false
let lockTime=0

function togglePass(){

let p=document.getElementById("pass")

if(p.type==="password"){
p.type="text"
}else{
p.type="password"
}

}

function login(){

if(locked){
return
}

let u=document.getElementById("user").value
let p=document.getElementById("pass").value
let msg=document.getElementById("msg")

if(u===correctUser && p===correctPass){

msg.style.color="green"
msg.innerText="Access Granted"

setTimeout(()=>{
window.location="dashboard.html"
},1000)

}

else{

attempts++

msg.style.color="#c0392b"
msg.innerText="Invalid credentials"

if(attempts>=3){

lockSystem()

}

}

}

function lockSystem(){

locked=true
lockTime=30

let msg=document.getElementById("msg")
msg.className="error lock"

let timer=setInterval(()=>{

msg.innerText="Too many attempts. Locked "+lockTime+"s"

lockTime--

if(lockTime<0){

clearInterval(timer)

locked=false
attempts=0

msg.className="error"
msg.innerText=""

}

},1000)

}

</script>

</body>
</html>
