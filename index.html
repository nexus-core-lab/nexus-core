<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Control System</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

html,body{
    margin:0;
    height:100%;
    font-family:'Sarabun',sans-serif;
    background:linear-gradient(#e3e7ea,#d9dee2);
    color:#222;
}

.wrapper{
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* HEADER */
.header{
    background:#22313b;
    color:#fff;
    padding:12px 22px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:14px;
}

/* MAIN */
.main{
    flex:1;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:40px 16px 20px 16px;
}

.panel{
    width:100%;
    max-width:520px;
    background:#fff;
    border:2px solid #2f3e49;
    padding:36px 30px;
}

/* LOGO */
.logo{
    width:68px;
    display:block;
    margin:0 auto 18px auto;
}

/* TITLES */
h1{
    text-align:center;
    font-size:18px;
    margin:0;
    font-weight:600;
}

.subtitle{
    text-align:center;
    font-size:13px;
    margin:6px 0 20px 0;
    color:#444;
}

/* INPUT */
input{
    width:100%;
    padding:10px;
    margin-bottom:12px;
    border:1.5px solid #444;
    font-size:14px;
    background:#f8f8f8;
    transition:all .2s;
}

input:focus{
    outline:none;
    border-color:#000;
    background:#fff;
}

/* BUTTON */
button{
    width:100%;
    padding:11px;
    background:#22313b;
    color:#fff;
    border:none;
    font-size:14px;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#1a262e;
}

.notice{
    margin-top:18px;
    font-size:12px;
    border-top:1px solid #ccc;
    padding-top:12px;
    line-height:1.6;
    color:#333;
}

/* FOOTER */
.footer{
    text-align:center;
    font-size:11px;
    padding:12px;
    background:#f2f4f6;
    border-top:1px solid #bbb;
    color:#444;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="header">
    <div>ศูนย์ควบคุมสิทธิ์การเข้าถึง</div>
    <div id="datetime"></div>
</div>

<div class="main">
<div class="panel">

<img src="logo.png" class="logo" alt="logo">

<h1>ระบบตรวจสอบสิทธิการเข้าใช้งาน</h1>
<div class="subtitle">Access Control System</div>

<input type="text" placeholder="รหัสประจำตัวเจ้าหน้าที่">
<input type="password" placeholder="รหัสผ่าน">

<button>เข้าสู่ระบบ</button>

<div class="notice">
การเข้าถึงโดยไม่ได้รับอนุญาตอาจมีความผิดตามกฎหมายที่เกี่ยวข้อง
</div>

</div>
</div>

<div class="footer">
© 2569 หน่วยงานกลางด้านความมั่นคงสารสนเทศ | เวอร์ชันระบบ 1.0.3
</div>

</div>

<script>
function updateTime(){
    const now=new Date();
    document.getElementById("datetime").innerText=
        now.toLocaleDateString("th-TH")+" "+
        now.toLocaleTimeString("th-TH");
}
setInterval(updateTime,1000);
updateTime();
</script>

</body>
</html>
