<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internal Access</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f3f4f6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.card{
background:#fff;
padding:40px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
width:90%;
max-width:360px;
text-align:center;
}
.logo{
margin-bottom:15px;
}
input{
width:100%;
padding:12px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:6px;
}
button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#111827;
color:white;
font-weight:bold;
cursor:pointer;
}
.message{
margin-top:10px;
font-size:13px;
min-height:18px;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">
<svg viewBox="0 0 100 100" width="60">
<circle cx="50" cy="50" r="45" fill="#111827"/>
<path d="M30 65 L50 30 L70 65 Z" fill="white"/>
</svg>
</div>

<h3>Internal Access Portal</h3>

<input id="user" placeholder="Employee ID">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">SIGN IN</button>

<div class="message" id="msg"></div>

</div>

<script>
function login(){
let u = document.getElementById("user").value;
let p = document.getElementById("pass").value;
let m = document.getElementById("msg");

if(u === "" || p === ""){
m.style.color = "red";
m.innerText = "All fields required";
return;
}

if(u === "admin" && p === "1234"){
m.style.color = "green";
m.innerText = "Access Granted";
}else{
m.style.color = "red";
m.innerText = "Invalid credentials";
}
}
</script>

</body>
</html>
