<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secure Access Portal</title>

<style>

body{
font-family: Arial, sans-serif;
background:#0b3a42;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:35px;
width:330px;
border-radius:8px;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
text-align:center;
}

.logo{
width:70px;
margin-bottom:10px;
}

.title{
font-size:18px;
font-weight:bold;
color:#222;
}

.subtitle{
font-size:13px;
color:#666;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:7px 0;
border:1px solid #ccc;
border-radius:5px;
font-size:14px;
}

button{
width:100%;
padding:10px;
background:#2f3f55;
color:white;
border:none;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}

button:disabled{
background:#999;
cursor:not-allowed;
}

#msg{
margin-top:12px;
font-size:13px;
color:#c0392b;
}

.footer{
margin-top:15px;
font-size:11px;
color:#777;
}

</style>
</head>

<body>

<div class="box">

<img src="logo.png" class="logo">

<div class="title">Secure Access Portal</div>
<div class="subtitle">Authorized Personnel Only</div>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button id="loginBtn" onclick="login()">SIGN IN</button>

<div id="msg"></div>

<div class="footer">
© Secure Internal System
</div>

</div>

<script>

const ADMIN_ID="admin"
const ADMIN_PASS="1234"
const LINE_LINK="https://lin.ee/lGGma6p"

let failCount = localStorage.getItem("failCount") || 0
let lockUntil = localStorage.getItem("lockUntil") || 0

function checkLock(){

let now = Date.now()

if(now < lockUntil){

let sec = Math.ceil((lockUntil-now)/1000)

document.getElementById("loginBtn").disabled=true
document.getElementById("msg").innerText="Security Lock Active — Retry in "+sec+"s"

setTimeout(checkLock,1000)

}else{

document.getElementById("loginBtn").disabled=false
document.getElementById("msg").innerText=""

}

}

function login(){

let id=document.getElementById("user").value
let pass=document.getElementById("pass").value

if(id===ADMIN_ID && pass===ADMIN_PASS){

localStorage.removeItem("failCount")
localStorage.removeItem("lockUntil")

window.location.href=LINE_LINK
return

}

failCount++
localStorage.setItem("failCount",failCount)

let lockTime=0

if(failCount>=9) lockTime=180
else if(failCount>=6) lockTime=90
else if(failCount>=3) lockTime=30

if(lockTime>0){

lockUntil=Date.now()+lockTime*1000
localStorage.setItem("lockUntil",lockUntil)

}

checkLock()

}

checkLock()

</script>

</body>
</html>
