<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS CORE - Access Control</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Segoe UI,Tahoma,sans-serif;}

body{
height:100vh;
background:#f4f6f8;
display:flex;
flex-direction:column;
}

.topbar{
background:#24343d;
color:#fff;
padding:12px 20px;
display:flex;
justify-content:space-between;
font-size:14px;
}

.container{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
background:#fff;
width:100%;
max-width:400px;
padding:35px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
text-align:center;
}

.logo{
width:120px;
margin-bottom:15px;
}

h2{
margin-bottom:5px;
}

.sub{
color:#666;
margin-bottom:25px;
font-size:14px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:#24343d;
color:#fff;
border:none;
border-radius:6px;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1b262c;
}

button:disabled{
background:#999;
cursor:not-allowed;
}

.error{
color:#d8000c;
font-size:13px;
margin-bottom:10px;
display:none;
}

.lockmsg{
color:#b30000;
font-size:13px;
margin-bottom:10px;
display:none;
}
</style>
</head>

<body>

<div class="topbar">
<div>NEXUS CORE - ศูนย์ควบคุมสิทธิ์</div>
<div id="clock"></div>
</div>

<div class="container">
<div class="card">

<img src="logo.png" class="logo" alt="NEXUS CORE">

<h2>ระบบตรวจสอบสิทธิการเข้าใช้งาน</h2>
<div class="sub">Access Control System</div>

<div class="error" id="errorMsg">รหัสไม่ถูกต้อง</div>
<div class="lockmsg" id="lockMsg"></div>

<input type="text" id="card" placeholder="รหัสประจำตัวเจ้าหน้าที่">
<input type="password" id="pass" placeholder="รหัสผ่าน">

<button onclick="login()" id="loginBtn">เข้าสู่ระบบ</button>

</div>
</div>

<script>
const correctCard="LC-A01";
const correctPass="Lc1993♧";

let attempts = localStorage.getItem("attempts") ? parseInt(localStorage.getItem("attempts")) : 0;
let lockUntil = localStorage.getItem("lockUntil") ? parseInt(localStorage.getItem("lockUntil")) : 0;

function updateClock(){
document.getElementById("clock").innerText = new Date().toLocaleString("th-TH");
}
setInterval(updateClock,1000);
updateClock();

function checkLock(){
if(Date.now() < lockUntil){
let remaining = Math.ceil((lockUntil - Date.now())/1000);
document.getElementById("lockMsg").style.display="block";
document.getElementById("lockMsg").innerText="บัญชีถูกล็อก กรุณารอ "+remaining+" วินาที";
document.getElementById("loginBtn").disabled=true;
return true;
}else{
document.getElementById("lockMsg").style.display="none";
document.getElementById("loginBtn").disabled=false;
return false;
}
}

setInterval(checkLock,1000);
checkLock();

function login(){

if(checkLock()) return;

let card=document.getElementById("card").value;
let pass=document.getElementById("pass").value;

if(card===correctCard && pass===correctPass){
attempts=0;
localStorage.setItem("attempts",0);
window.location.href="home.html";
}else{
attempts++;
localStorage.setItem("attempts",attempts);

document.getElementById("errorMsg").style.display="block";

if(attempts==3){
lock(30);
}
else if(attempts==6){
lock(120);
}
else if(attempts>=9){
lock(300);
}
}
}

function lock(seconds){
lockUntil = Date.now() + seconds*1000;
localStorage.setItem("lockUntil",lockUntil);
}
</script>

</body>
</html>
