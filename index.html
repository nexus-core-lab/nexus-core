<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Control</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#eef1f4;
}

.topbar{
  position:fixed;
  top:0;
  width:100%;
  background:#23343b;
  color:white;
  padding:12px 20px;
  font-size:14px;
}

.card{
  width:95%;
  max-width:420px;
  background:white;
  padding:35px 25px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  text-align:center;
}

.logo{
  width:70px;
  margin-bottom:15px;
}

h2{
  margin-bottom:5px;
}

.sub{
  color:gray;
  margin-bottom:20px;
  font-size:14px;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:1px solid #ccc;
  border-radius:6px;
}

button{
  width:100%;
  padding:12px;
  background:#2f4858;
  color:white;
  border:none;
  border-radius:6px;
  margin-top:10px;
  cursor:pointer;
}

button:disabled{
  background:#888;
  cursor:not-allowed;
}

.error{
  color:red;
  font-size:14px;
  margin-top:10px;
}

.timer{
  color:#b30000;
  font-size:14px;
  margin-top:8px;
}
</style>
</head>
<body>

<div class="topbar">
ศูนย์ควบคุมสิทธิการเข้าใช้งาน
</div>

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/3064/3064155.png" class="logo">
<h2>ระบบตรวจสอบสิทธิ</h2>
<div class="sub">Access Control System</div>

<input type="text" id="card" placeholder="รหัสประจำตัวเจ้าหน้าที่">
<input type="password" id="pass" placeholder="รหัสผ่าน">
<button id="loginBtn" onclick="login()">เข้าสู่ระบบ</button>

<div class="error" id="error"></div>
<div class="timer" id="timer"></div>
</div>

<script>
const correctCard="LC-A01";
const correctPass="Lc1993♧";

let failCount = Number(localStorage.getItem("failCount")) || 0;
let lockUntil = Number(localStorage.getItem("lockUntil")) || 0;

const errorDiv = document.getElementById("error");
const timerDiv = document.getElementById("timer");
const loginBtn = document.getElementById("loginBtn");

function checkLock(){
  if(Date.now() < lockUntil){
    let remaining = Math.floor((lockUntil - Date.now())/1000);
    loginBtn.disabled = true;
    timerDiv.innerText = "ระบบถูกล็อก เหลือเวลา " + remaining + " วินาที";
  } else {
    loginBtn.disabled = false;
    timerDiv.innerText = "";
  }
}

setInterval(checkLock,1000);

function login(){

  if(Date.now() < lockUntil){
    return;
  }

  let card = document.getElementById("card").value;
  let pass = document.getElementById("pass").value;

  if(card === correctCard && pass === correctPass){
    sessionStorage.setItem("loggedIn","true");
    window.location.href="success.html";
  } else {

    failCount++;
    localStorage.setItem("failCount",failCount);

    errorDiv.innerText="รหัสไม่ถูกต้อง ("+failCount+" ครั้ง)";

    if(failCount === 3){
      lock(30);
    }
    else if(failCount === 6){
      lock(120);
    }
    else if(failCount === 9){
      lock(600);
    }

  }
}

function lock(seconds){
  lockUntil = Date.now() + seconds*1000;
  localStorage.setItem("lockUntil",lockUntil);
}
</script>

</body>
</html>
