<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- สำคัญมาก -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<!-- ป้องกัน Google Translate popup -->
<meta name="google" content="notranslate">

<title>Nexus Core | Internal Access</title>

<style>
*{box-sizing:border-box;}

html,body{
  margin:0;
  height:100%;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
  background:#eef1f5;
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:16px;
}

.card{
  background:#fff;
  width:100%;
  max-width:480px;   /* ขยายขึ้น */
  padding:50px 35px; /* เพิ่มพื้นที่ */
  border-radius:18px;
  box-shadow:0 25px 60px rgba(0,0,0,0.12);
  text-align:center;
}

.logo{
  width:110px; /* ขยายโลโก้ */
  margin-bottom:20px;
}

h1{
  font-size:22px;
  margin-bottom:35px;
  color:#1f2937;
}

input{
  width:100%;
  padding:16px;
  margin-bottom:18px;
  border:1px solid #d1d5db;
  border-radius:10px;
  font-size:16px;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:10px;
  background:#1f2937;
  color:white;
  font-weight:600;
  font-size:16px;
}

.footer{
  margin-top:30px;
  font-size:13px;
  color:#6b7280;
}
</style>
</head>

<body>

<div class="card">

<img src="logo.png" class="logo" onerror="this.style.display='none'">

<h1>Internal Access Portal</h1>

<input type="text" placeholder="Employee ID">
<input type="password" placeholder="Password">

<button>SIGN IN</button>

<div class="footer">
© 2025 Nexus Core System · Internal Use Only
</div>

</div>

</body>
</html>
