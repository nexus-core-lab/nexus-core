<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Core System</title>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(180deg,#0c3a47,#08313b);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
width:360px;
padding:35px;
border-radius:16px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

.logo{
width:70px;
margin-bottom:15px;
}

h1{
font-size:22px;
margin:5px 0;
letter-spacing:1px;
}

.subtitle{
color:#555;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:13px;
margin-top:12px;
border:none;
border-radius:8px;
background:#3c4f63;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#2f4052;
}

button:disabled{
background:#9aa3af;
cursor:not-allowed;
opacity:0.8;
}

.lockmsg{
margin-top:12px;
color:#d22;
font-size:14px;
}

.footer{
margin-top:18px;
font-size:12px;
color:#666;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>NEXUS CORE SYSTEM</h1>
<div class="subtitle">Secure Access Portal</div>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button id="loginBtn" onclick="login()">SIGN IN</button>

<div id="lockmsg" class="lockmsg"></div>

<div class="footer">
Authorized personnel only. Unauthorized access is strictly prohibited and monitored.<br><br>
© 2025 Nexus Core Systems<br>
Internal Access Gateway v2.4.1
</div>

</div>

<script>

let failCount = localStorage.getItem("failCount") || 0
let lockUntil = localStorage.getItem("lockUntil") || 0

const btn = document.getElementById("loginBtn")
const msg = document.getElementById("lockmsg")

function login(){

if(Date.now() < lockUntil){
return
}

let user = document.getElementById("user").value
let pass = document.getElementById("pass").value

if(user==="admin" && pass==="1234"){
alert("Access Granted")
failCount = 0
localStorage.setItem("failCount",0)
return
}

failCount++
localStorage.setItem("failCount",failCount)

let lockTime = 0

if(failCount==3) lockTime=30
if(failCount==6) lockTime=90
if(failCount==9) lockTime=180

if(lockTime>0){
lockUntil = Date.now() + lockTime*1000
localStorage.setItem("lockUntil",lockUntil)
}

updateLock()

}

function updateLock(){

let now = Date.now()

if(now < lockUntil){

let sec = Math.ceil((lockUntil-now)/1000)

btn.disabled = true
msg.innerText = "Security Lock Active — Retry in "+sec+"s"

setTimeout(updateLock,1000)

}else{

btn.disabled = false
msg.innerText = ""

}

}

updateLock()

</script>

</body>
</html>
