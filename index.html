<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Control System</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

html,body{
    margin:0;
    height:100%;
    font-family:'Sarabun',sans-serif;
    background:#dfe3e6;
    color:#2b2b2b;
}

.wrapper{
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

.header{
    background:#24343d;
    color:#fff;
    padding:10px 18px;
    display:flex;
    justify-content:space-between;
    font-size:13px;
}

.main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.panel{
    width:100%;
    max-width:420px;
    background:#ffffff;
    border:1px solid #4a5861;
    padding:28px 24px;
}

.logo{
    width:58px;
    display:block;
    margin:0 auto 14px auto;
    opacity:.9;
}

h1{
    text-align:center;
    font-size:16px;
    margin:0;
    font-weight:600;
}

.subtitle{
    text-align:center;
    font-size:13px;
    margin:4px 0 16px 0;
    color:#555;
}

input{
    width:100%;
    padding:9px 10px;
    margin-bottom:10px;
    border:1px solid #666;
    font-size:14px;
    background:#f7f7f7;
}

input:focus{
    outline:none;
    background:#fff;
    border-color:#2b2b2b;
}

button{
    width:100%;
    padding:10px;
    background:#2c3e47;
    color:#fff;
    border:none;
    font-size:14px;
    cursor:pointer;
}

button:hover{
    background:#22313a;
}

.notice{
    margin-top:14px;
    font-size:12px;
    border-top:1px solid #d0d0d0;
    padding-top:10px;
    color:#444;
    line-height:1.5;
}

.status{
    margin-top:10px;
    font-size:13px;
    text-align:center;
}

.success{ color:green; }
.error{ color:#b00020; }

.footer{
    text-align:center;
    font-size:11px;
    padding:8px;
    background:#eef1f3;
    border-top:1px solid #c4c8cc;
    color:#555;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="header">
    <div>ศูนย์ควบคุมสิทธิ์การเข้าถึง</div>
    <div id="datetime"></div>
</div>

<div class="main">
<div class="panel">

<img src="logo.png" class="logo" alt="logo">

<h1>ระบบตรวจสอบสิทธิการเข้าใช้งาน</h1>
<div class="subtitle">Access Control System</div>

<input type="text" id="card" placeholder="รหัสประจำตัวเจ้าหน้าที่">
<input type="password" id="pass" placeholder="รหัสผ่าน">

<button onclick="login()">เข้าสู่ระบบ</button>

<div class="status" id="status"></div>

<div class="notice">
การเข้าถึงโดยไม่ได้รับอนุญาต อาจมีความผิดตามกฎหมายที่เกี่ยวข้อง
</div>

</div>
</div>

<div class="footer">
© 2569 หน่วยงานกลางด้านความมั่นคงสารสนเทศ | เวอร์ชันระบบ 1.0.3
</div>

</div>

<script>
/* ====== Credentials ====== */
const correctCard = "LC-A01";
const correctPass = "Lc1993♧";

/* ====== Login Function ====== */
function login(){
    const card = document.getElementById("card").value.trim();
    const pass = document.getElementById("pass").value.trim();
    const status = document.getElementById("status");

    if(card === correctCard && pass === correctPass){
        status.innerHTML = "ยืนยันตัวตนสำเร็จ";
        status.className = "status success";
    }else{
        status.innerHTML = "ข้อมูลไม่ถูกต้อง";
        status.className = "status error";
    }
}

/* ====== Time ====== */
function updateTime(){
    const now = new Date();
    document.getElementById("datetime").innerText =
        now.toLocaleDateString("th-TH") + " " +
        now.toLocaleTimeString("th-TH");
}
setInterval(updateTime,1000);
updateTime();
</script>

</body>
</html>
