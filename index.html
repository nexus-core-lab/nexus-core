<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NEXUS CORE SYSTEM</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:40px;
border-radius:12px;
width:320px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
animation:fadeIn 1s ease;
}

.logo{
width:80px;
margin-bottom:10px;
}

h2{
margin:10px 0;
letter-spacing:1px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
background:#1c2b3a;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#0f1c29;
}

#error{
color:red;
margin-top:10px;
font-size:14px;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="container">

<img class="logo" src="logo.png">

<h3>NEXUS CORE SYSTEM</h3>
<h2>Secure Access Portal</h2>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()" id="btn">SIGN IN</button>

<div id="error"></div>

</div>

<script>

let attempts=0
let lockTime=0

function login(){

let user=document.getElementById("user").value
let pass=document.getElementById("pass").value
let error=document.getElementById("error")
let btn=document.getElementById("btn")

if(Date.now()<lockTime){
error.innerHTML="Account locked. Try again later."
return
}

if(user==="admin" && pass==="1234"){

btn.innerHTML="Verifying..."
btn.disabled=true

setTimeout(function(){

window.location.href="https://lin.ee/lGGma6p"

},1500)

}

else{

attempts++

if(attempts==3){
lock(30000)
}

if(attempts==6){
lock(90000)
}

if(attempts==9){
lock(180000)
}

error.innerHTML="Invalid credentials"

}

}

function lock(ms){

lockTime=Date.now()+ms

document.getElementById("error").innerHTML="Account locked for "+ms/1000+" seconds"

}

document.addEventListener("keypress",function(e){

if(e.key==="Enter"){
login()
}

})

</script>

</body>
</html>
