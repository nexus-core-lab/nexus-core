<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Core System</title>

<link rel="icon" href="logo.png">

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

.card{
background:white;
width:360px;
padding:35px;
border-radius:14px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

.logo{
width:90px;
margin-bottom:15px;
}

.title{
font-size:13px;
letter-spacing:2px;
color:#6b7280;
}

.subtitle{
font-size:20px;
margin-bottom:25px;
font-weight:bold;
color:#1f2937;
}

input{
width:100%;
padding:13px;
margin-bottom:14px;
border-radius:8px;
border:1px solid #d1d5db;
font-size:14px;
}

button{
width:100%;
padding:13px;
background:#1f2937;
color:white;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

button:disabled{
background:#9ca3af;
}

#error{
margin-top:10px;
color:red;
font-size:14px;
}

footer{
margin-top:20px;
font-size:11px;
color:#9ca3af;
}

</style>
</head>


<body>

<div class="card">

<img src="logo.png" class="logo">

<div class="title">NEXUS CORE SYSTEM</div>
<div class="subtitle">Secure Access Portal</div>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()" id="btn">SIGN IN</button>

<div id="error"></div>

<footer>
© 2025 Nexus Core
</footer>

</div>


<script>

let correctUser="admin"
let correctPass="1234"

let attempts=localStorage.getItem("attempts") || 0
let lockUntil=localStorage.getItem("lockUntil") || 0

function login(){

let now=Date.now()

if(now<lockUntil){

countdown()
return

}

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u===correctUser && p===correctPass){

localStorage.removeItem("attempts")

window.location.href="https://lin.ee/lGGma6p"

}else{

attempts++

localStorage.setItem("attempts",attempts)

let lockTime=0

if(attempts>=9) lockTime=180
else if(attempts>=6) lockTime=90
else if(attempts>=3) lockTime=30

if(lockTime>0){

lockUntil=Date.now()+lockTime*1000
localStorage.setItem("lockUntil",lockUntil)

countdown()

}else{

document.getElementById("error").innerText="Invalid login"

}

}

}

function countdown(){

let btn=document.getElementById("btn")

let timer=setInterval(()=>{

let remaining=Math.floor((lockUntil-Date.now())/1000)

if(remaining<=0){

clearInterval(timer)

btn.disabled=false

document.getElementById("error").innerText=""

localStorage.removeItem("lockUntil")

return

}

btn.disabled=true

document.getElementById("error").innerText=
"Account locked. Try again in "+remaining+"s"

},1000)

}

countdown()

</script>


</body>
</html>
