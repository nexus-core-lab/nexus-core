<script>
const correctCard="LC-A01";
const correctPass="Lc1993♧";

let failCount = parseInt(localStorage.getItem("failCount")) || 0;
let lockUntil = parseInt(localStorage.getItem("lockUntil")) || 0;
let timerInterval = null;

function updateTime(){
    const now=new Date();
    document.getElementById("datetime").innerText=
    now.toLocaleDateString("en-GB")+" "+now.toLocaleTimeString();
}
setInterval(updateTime,1000);
updateTime();

window.onload = function(){
    if(Date.now() < lockUntil){
        const remaining = Math.ceil((lockUntil-Date.now())/1000);
        lockSystem(remaining);
    }
};

function authenticate(){

    if(Date.now() < lockUntil){
        return;
    }

    const card=document.getElementById("card").value.trim();
    const pass=document.getElementById("pass").value.trim();
    const message=document.getElementById("msg");

    if(card===correctCard && pass===correctPass){

        message.style.color="green";
        message.innerText="ยืนยันตัวตนสำเร็จ";

        failCount=0;
        localStorage.removeItem("failCount");

    }else{

        failCount++;
        localStorage.setItem("failCount",failCount);

        message.style.color="red";
        message.innerText="ข้อมูลไม่ถูกต้อง";

        if(failCount===3) lockSystem(30);
        if(failCount===6) lockSystem(60);
        if(failCount===9) lockSystem(180);
    }
}

function lockSystem(seconds){

    const message=document.getElementById("msg");
    const button=document.getElementById("loginBtn");
    const cardInput=document.getElementById("card");
    const passInput=document.getElementById("pass");

    lockUntil=Date.now()+seconds*1000;
    localStorage.setItem("lockUntil",lockUntil);

    button.disabled=true;
    cardInput.disabled=true;
    passInput.disabled=true;

    timerInterval=setInterval(()=>{

        const remaining=Math.ceil((lockUntil-Date.now())/1000);

        if(remaining<=0){
            clearInterval(timerInterval);

            button.disabled=false;
            cardInput.disabled=false;
            passInput.disabled=false;

            message.innerText="";
            localStorage.removeItem("lockUntil");

        }else{
            message.style.color="red";
            message.innerText=
            "ระบบล็อกอยู่ โปรดลองใหม่อีกครั้งใน "+remaining+" วินาที";
        }

    },1000);
}
</script>
