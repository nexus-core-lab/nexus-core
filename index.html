<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NEXUS CORE | Secure Access</title>
<style>

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#111;
    width:350px;
    padding:40px;
    border-radius:15px;
    box-shadow:0 0 40px rgba(0,0,0,0.6);
    text-align:center;
    color:white;
}

.logo{
    width:120px;
    margin-bottom:20px;
}

h2{
    margin-bottom:25px;
    font-weight:500;
    letter-spacing:2px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    background:#1c1c1c;
    color:white;
}

input:focus{
    outline:2px solid #c9a227;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#c9a227;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#e6c35c;
}

.footer{
    margin-top:20px;
    font-size:12px;
    color:#888;
}

</style>
</head>

<body>

<div class="container">

    <!-- ใส่ไฟล์โลโก้ของคุณชื่อ logo.png -->
    <img src="logo.png" class="logo">

    <h2>NEXUS CORE</h2>

    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">

    <button>SECURE LOGIN</button>

    <div class="footer">
        Authorized Personnel Only<br>
        © 2026 Nexus Core Systems
    </div>

</div>

</body>
</html>
