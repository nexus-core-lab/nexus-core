<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Core System</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:'Inter',sans-serif;
background:linear-gradient(160deg,#0b2f3f,#0e445a);
}

.login-box{
background:#f4f4f4;
padding:35px;
width:320px;
border-radius:14px;
box-shadow:0 15px 40px rgba(0,0,0,0.35);
text-align:center;
}

.logo{
width:70px;
margin-bottom:10px;
}

h1{
font-size:20px;
margin:5px 0;
letter-spacing:1px;
}

.sub{
font-size:14px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1.4px solid #cfd4da;
font-size:14px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#2f4054;
color:white;
font-weight:600;
cursor:pointer;
}

button:disabled{
background:#9ca3af;
}

#msg{
margin-top:12px;
font-size:14px;
}

.lock{
color:#d33;
}

.footer{
margin-top:15px;
font-size:11px;
color:#666;
}

</style>
</head>

<body>

<div class="login-box">

<img class="logo" src="logo.png">

<h1>NEXUS CORE SYSTEM</h1>
<div class="sub">Secure Access Portal</div>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button id="loginBtn" onclick="login()">SIGN IN</button>

<div id="msg"></div>

<div class="footer">
Authorized personnel only. All access is logged and monitored.<br>
© 2025 Nexus Core Systems<br>
Internal Access Gateway v2.4.1
</div>

</div>

<script>

const correctUser="admin";
const correctPass="1234";

let attempts=localStorage.getItem("attempts")||0;
let lockUntil=localStorage.getItem("lockUntil")||0;

const btn=document.getElementById("loginBtn");
const msg=document.getElementById("msg");

function checkLock(){

let now=Date.now();

if(now<lockUntil){

let remain=Math.ceil((lockUntil-now)/1000);

btn.disabled=true;
msg.innerHTML="<span class='lock'>Security Lock Active — Retry in "+remain+"s</span>";

setTimeout(checkLock,1000);

}else{

btn.disabled=false;
msg.innerHTML="";
}

}

checkLock();

function login(){

let user=document.getElementById("user").value;
let pass=document.getElementById("pass").value;

if(user===correctUser && pass===correctPass){

localStorage.setItem("attempts",0);

window.location.href="https://lin.ee/lGGma6p";

}else{

attempts++;
localStorage.setItem("attempts",attempts);

let lockTime=0;

if(attempts>=9) lockTime=180;
else if(attempts>=6) lockTime=90;
else if(attempts>=3) lockTime=30;

if(lockTime>0){

lockUntil=Date.now()+lockTime*1000;
localStorage.setItem("lockUntil",lockUntil);

checkLock();

}else{

msg.innerHTML="<span class='lock'>Invalid credentials</span>";

}

}

}

document.addEventListener("keydown",function(e){
if(e.key==="Enter"){
login();
}
});

</script>

</body>
</html>
