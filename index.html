<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nexus Core System</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#0b3c42,#0f6a6e);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

.card{
background:white;
padding:40px;
border-radius:20px;
width:320px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.logo{
width:80px;
margin-bottom:10px;
}

h2{
margin:10px 0 0;
letter-spacing:2px;
}

.sub{
color:gray;
margin-bottom:20px;
font-size:14px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#2f4057;
color:white;
font-weight:bold;
cursor:pointer;
}

button:disabled{
background:gray;
}

#msg{
margin-top:10px;
color:red;
font-size:14px;
}

.footer{
font-size:12px;
color:gray;
margin-top:20px;
}

</style>
</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<h2>NEXUS CORE SYSTEM</h2>
<div class="sub">Secure Access Portal</div>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()" id="btn">SIGN IN</button>

<div id="msg"></div>

<div class="footer">
Authorized personnel only. All access is logged and monitored.<br>
© 2025 Nexus Core Systems
</div>

</div>

<script>

const ADMIN_ID="admin"
const ADMIN_PASS="1234"
const LINE_URL="https://lin.ee/lGGma6p"

let attempts=parseInt(localStorage.getItem("attempts"))||0
let lockUntil=parseInt(localStorage.getItem("lockUntil"))||0

const btn=document.getElementById("btn")
const msg=document.getElementById("msg")

function updateLock(){

let now=Date.now()

if(now<lockUntil){

btn.disabled=true

let remain=Math.ceil((lockUntil-now)/1000)

msg.innerHTML="Security Lock Active — Retry in "+remain+"s"

setTimeout(updateLock,1000)

}else{

btn.disabled=false
msg.innerHTML=""

}

}

updateLock()

function login(){

let user=document.getElementById("user").value
let pass=document.getElementById("pass").value

if(user===ADMIN_ID && pass===ADMIN_PASS){

localStorage.removeItem("attempts")
localStorage.removeItem("lockUntil")

window.location.href=LINE_URL

return
}

attempts++
localStorage.setItem("attempts",attempts)

let lockTime=0

if(attempts>=9){
lockTime=180
}
else if(attempts>=6){
lockTime=90
}
else if(attempts>=3){
lockTime=30
}

if(lockTime>0){

lockUntil=Date.now()+lockTime*1000

localStorage.setItem("lockUntil",lockUntil)

}

updateLock()

}

</script>

</body>
</html>
