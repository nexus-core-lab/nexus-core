<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nexus Core System</title>

<style>

body{
font-family:Arial;
background:#0f4c53;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:40px;
border-radius:15px;
width:320px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.logo{
width:90px;
margin-bottom:15px;
}

h2{
margin:5px;
}

.sub{
color:#777;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:#26384d;
color:white;
border:none;
border-radius:8px;
font-size:15px;
cursor:pointer;
}

button:disabled{
background:#999;
}

.error{
color:red;
margin-top:10px;
}

.footer{
font-size:11px;
color:#777;
margin-top:20px;
}

</style>
</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<h2>NEXUS CORE SYSTEM</h2>
<div class="sub">Secure Access Portal</div>

<form id="loginForm">

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button id="loginBtn">SIGN IN</button>

</form>

<div id="msg" class="error"></div>

<div class="footer">
Authorized personnel only.<br>
All access logged and monitored.<br>
© 2025 Nexus Core Systems
</div>

</div>

<script>

const form=document.getElementById("loginForm")
const msg=document.getElementById("msg")
const btn=document.getElementById("loginBtn")

let lock=false

if(sessionStorage.getItem("login")==="true"){
location.href="https://lin.ee/lGGma6p"
}

form.addEventListener("submit",function(e){

e.preventDefault()

if(lock) return

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u==="admin" && p==="1234"){

sessionStorage.setItem("login","true")

location.href="https://lin.ee/lGGma6p"

}else{

msg.innerText="Invalid access credentials"

lock=true
btn.disabled=true

let t=30

let timer=setInterval(function(){

msg.innerText="Security Lock Active — Retry in "+t+"s"

t--

if(t<0){

clearInterval(timer)

msg.innerText=""
btn.disabled=false
lock=false

}

},1000)

}

})

</script>

</body>
</html>
