<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secure Access Portal</title>

<style>

body{
font-family:Arial;
background:#0b3c44;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-box{
background:white;
padding:35px;
width:320px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
text-align:center;
}

.logo{
width:65px;
margin-bottom:10px;
}

h2{
margin:5px 0;
font-size:18px;
}

p{
font-size:13px;
color:#666;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#3a4a63;
color:white;
border:none;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}

button:disabled{
background:#888;
}

#msg{
margin-top:12px;
font-size:13px;
color:#c0392b;
}

.footer{
margin-top:15px;
font-size:11px;
color:#777;
}

</style>
</head>

<body>

<div class="login-box">

<img src="logo.png" class="logo">

<h2>NEXUS CORE SYSTEM</h2>
<p>Secure Access Portal</p>

<input id="id" placeholder="User ID">
<input id="pw" type="password" placeholder="Password">

<button onclick="login()" id="btn">SIGN IN</button>

<div id="msg"></div>

<div class="footer">
Authorized personnel only.<br>
All access logged and monitored.
</div>

</div>

<script>

let attempts = parseInt(localStorage.getItem("attempts")) || 0;
let lockUntil = parseInt(localStorage.getItem("lockUntil")) || 0;

function updateLock(){

let now = Date.now();

if(lockUntil > now){

let sec = Math.ceil((lockUntil-now)/1000);

document.getElementById("msg").innerText =
"Security Lock Active – Retry in "+sec+"s";

document.getElementById("btn").disabled = true;

setTimeout(updateLock,1000);

}else{

document.getElementById("btn").disabled=false;
document.getElementById("msg").innerText="";

}

}

function login(){

let id = document.getElementById("id").value;
let pw = document.getElementById("pw").value;

let now = Date.now();

if(now < lockUntil){
updateLock();
return;
}

if(id==="admin" && pw==="1234"){

attempts=0;
localStorage.removeItem("attempts");

window.location.href="https://lin.ee/lGGma6p";

return;

}

attempts++;

localStorage.setItem("attempts",attempts);

let lock=0;

if(attempts>=9) lock=180;
else if(attempts>=6) lock=90;
else if(attempts>=3) lock=30;

if(lock>0){

lockUntil = now + lock*1000;

localStorage.setItem("lockUntil",lockUntil);

}

updateLock();

}

updateLock();

</script>

</body>
</html>
