<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nexus Core System</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f4c4c,#1e7777);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.login-box{
background:white;
padding:30px;
width:320px;
border-radius:14px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.logo{
width:60px;
margin-bottom:10px;
}

h2{
margin:5px 0;
letter-spacing:2px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:6px;
background:#7f8c8d;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#5d6d6d;
}

#lockMsg{
margin-top:10px;
font-size:13px;
color:red;
}

.footer{
font-size:10px;
margin-top:12px;
color:#666;
}

</style>
</head>

<body>

<div class="login-box">

<img src="logo.png" class="logo">

<h2>NEXUS CORE SYSTEM</h2>
<p style="font-size:12px;color:#777">Secure Access Portal</p>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button id="loginBtn" onclick="login()">SIGN IN</button>

<div id="lockMsg"></div>

<div class="footer">
Authorized personnel only.  
All access is logged and monitored.
</div>

</div>

<script>

const ADMIN_ID="admin"
const ADMIN_PASS="1234"

const LINE_URL="https://lin.ee/lGGma6p"

let attempts=parseInt(localStorage.getItem("attempts"))||0
let lockUntil=parseInt(localStorage.getItem("lockUntil"))||0

const btn=document.getElementById("loginBtn")
const msg=document.getElementById("lockMsg")

function updateLock(){

let now=Date.now()

if(now<lockUntil){

btn.disabled=true

let sec=Math.ceil((lockUntil-now)/1000)

msg.innerText="Security Lock Active – Retry in "+sec+"s"

setTimeout(updateLock,1000)

}else{

btn.disabled=false
msg.innerText=""

localStorage.removeItem("lockUntil")
localStorage.removeItem("attempts")

attempts=0

}

}

updateLock()

function login(){

let user=document.getElementById("user").value
let pass=document.getElementById("pass").value

let now=Date.now()

if(now<lockUntil){
return
}

if(user===ADMIN_ID && pass===ADMIN_PASS){

localStorage.removeItem("attempts")
localStorage.removeItem("lockUntil")

window.location.href=LINE_URL
return

}

attempts++
localStorage.setItem("attempts",attempts)

let lockTime=0

if(attempts>=9){
lockTime=180
}
else if(attempts>=6){
lockTime=90
}
else if(attempts>=3){
lockTime=30
}

if(lockTime>0){

lockUntil=Date.now()+lockTime*1000

localStorage.setItem("lockUntil",lockUntil)

}

updateLock()

}

</script>

</body>
</html>
