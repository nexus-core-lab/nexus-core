<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Core | Secure Access</title>

<style>
body{
  margin:0;
  font-family:Segoe UI, Arial, sans-serif;
  background:#f4f6f8;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:#fff;
  width:350px;
  padding:35px;
  border-radius:8px;
  box-shadow:0 8px 24px rgba(0,0,0,0.08);
  text-align:center;
}

.logo{
  width:80px;
  margin-bottom:10px;
}

h1{
  font-size:18px;
  margin-bottom:20px;
  color:#1f2937;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:1px solid #d1d5db;
  border-radius:6px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:6px;
  background:#1f2937;
  color:white;
  font-weight:600;
  cursor:pointer;
}

button:disabled{
  background:#9ca3af;
  cursor:not-allowed;
}

.message{
  margin-top:15px;
  font-size:13px;
  color:#dc2626;
}

.footer{
  margin-top:20px;
  font-size:11px;
  color:#6b7280;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo" alt="Logo">

<h1>Secure Access Portal</h1>

<input type="text" id="username" placeholder="User ID">
<input type="password" id="password" placeholder="Password">

<button onclick="login()" id="loginBtn">SIGN IN</button>

<div class="message" id="message"></div>

<div class="footer">
© 2025 Nexus Core. All rights reserved.
</div>

</div>

<script>

let attempts = 0;
let lockLevel = 0;
let lockTimer = null;

const correctUser = "admin";
const correctPass = "1234";

function login(){

  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;
  const msg = document.getElementById("message");

  if(user === correctUser && pass === correctPass){
    msg.style.color = "green";
    msg.innerText = "Access Granted";
    return;
  }

  attempts++;

  if(attempts === 3){
    lockAccount(30);
  }
  else if(attempts === 6){
    lockAccount(60);
  }
  else if(attempts === 9){
    lockAccount(120);
  }
  else{
    msg.innerText = "Invalid credentials (" + attempts + " attempts)";
  }
}

function lockAccount(seconds){

  const btn = document.getElementById("loginBtn");
  const msg = document.getElementById("message");

  btn.disabled = true;

  let remaining = seconds;

  msg.innerText = "Account locked for " + remaining + " seconds";

  lockTimer = setInterval(() => {
    remaining--;
    msg.innerText = "Account locked for " + remaining + " seconds";

    if(remaining <= 0){
      clearInterval(lockTimer);
      btn.disabled = false;
      attempts = 0;
      msg.innerText = "You may try again.";
    }
  },1000);
}

</script>

</body>
</html>
