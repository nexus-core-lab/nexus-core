<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Core System</title>

<style>
body{
margin:0;
font-family: Arial, Helvetica, sans-serif;
background:#0f4c4c;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:40px;
border-radius:14px;
width:320px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

.logo{
width:90px;
margin-bottom:15px;
}

h1{
font-size:22px;
margin:10px 0;
letter-spacing:1px;
}

.subtitle{
color:#666;
margin-bottom:25px;
font-size:14px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:8px;
background:#2c3e50;
color:white;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#1f2c3a;
}

.status{
margin-top:15px;
font-size:13px;
color:#c0392b;
}

.footer{
margin-top:18px;
font-size:11px;
color:#777;
line-height:1.4;
}
</style>

</head>

<body>

<div class="card">

<img src="https://i.imgur.com/6o5VbQp.png" class="logo">

<h1>NEXUS CORE SYSTEM</h1>
<div class="subtitle">Internal Access Portal</div>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">SIGN IN</button>

<div id="msg" class="status"></div>

<div class="footer">
Authorized personnel only<br>
Access is logged and monitored<br>
© 2025 Nexus Core Systems
</div>

</div>

<script>

function login(){

let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u==="admin" && p==="1234"){
window.location.href="https://lin.ee/lGGma6p";
}
else{
document.getElementById("msg").innerText="Invalid access credentials";
}

}

</script>

</body>
</html>
