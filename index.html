<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS CORE</title>

<style>
body{
    margin:0;
    background:#e6e6e6;
    font-family:Arial;
}

.topbar{
    background:#111;
    color:#fff;
    padding:8px 15px;
    display:flex;
    justify-content:space-between;
}

.container{
    max-width:400px;
    margin:60px auto;
    background:#fff;
    padding:25px;
    border:1px solid #bbb;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:12px;
    border:1px solid #666;
}

button{
    width:100%;
    padding:10px;
    background:#000;
    color:#fff;
    border:none;
}

.message{
    margin-top:10px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="topbar">
    <div>เครือข่ายภายในที่ปลอดภัย</div>
    <div id="time"></div>
</div>

<div class="container">
    <h3>ระบบสารสนเทศหลัก NEXUS</h3>
    <input type="text" id="card" placeholder="รหัสบัตร">
    <input type="password" id="pass" placeholder="รหัสผ่าน">
    <button id="loginBtn">ยืนยันตัวตน</button>
    <div class="message" id="msg"></div>
</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

const correctCard = "LC-A01";
const correctPass = "Lc1993♧";

let attempts = 0;
let locked = false;

const card = document.getElementById("card");
const pass = document.getElementById("pass");
const btn = document.getElementById("loginBtn");
const msg = document.getElementById("msg");

btn.onclick = function(){

    if(locked) return;

    msg.innerText = "กำลังตรวจสอบ...";
    btn.disabled = true;

    setTimeout(function(){

        if(card.value === correctCard && pass.value === correctPass){

            msg.style.color = "green";
            msg.innerText = "เข้าสู่ระบบสำเร็จ";

            setTimeout(function(){
                window.location.href = "https://lin.ee/xbIaU45";
            },1000);

            return;
        }

        attempts++;

        if(attempts >= 3){
            lockSystem();
        }else{
            msg.style.color = "red";
            msg.innerText = "รหัสไม่ถูกต้อง ("+attempts+"/3)";
            btn.disabled = false;
            pass.value="";
        }

    },1000);
};

function lockSystem(){

    locked = true;
    let timeLeft = 30;

    card.disabled = true;
    pass.disabled = true;

    const timer = setInterval(function(){

        msg.style.color = "red";
        msg.innerText = "ระบบถูกล็อก ลองใหม่ใน "+timeLeft+" วินาที";

        timeLeft--;

        if(timeLeft < 0){
            clearInterval(timer);
            locked = false;
            attempts = 0;
            btn.disabled = false;
            card.disabled = false;
            pass.disabled = false;
            msg.innerText = "";
        }

    },1000);
}

function updateTime(){
    const now = new Date();
    document.getElementById("time").innerText =
        now.toLocaleDateString() + " " + now.toLocaleTimeString();
}

setInterval(updateTime,1000);
updateTime();

});
</script>

</body>
</html>
