<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS CORE | Secure Access</title>

<style>
*{box-sizing:border-box}

body{
    margin:0;
    font-family:Segoe UI, Arial, sans-serif;
    background:#eef2f5;
    color:#1f2933;
}

/* HEADER */
.header{
    background:#1e2a34;
    color:#fff;
    padding:16px 18px;
    display:flex;
    justify-content:space-between;
    font-size:14px;
}

/* MAIN */
.main{
    padding:20px 14px 30px 14px;
}

/* PANEL */
.panel{
    width:100%;
    background:#ffffff;
    padding:28px</div>
</div>

<div class="footer">
Unauthorized access is prohibited and subject to monitoring.
</div>

<script>
document.addEventListener("DOMContentLoaded",function(){

const correctCard="LC-A01";
const correctPass="Lc1993♧";

let failCount=parseInt(localStorage.getItem("failCount"))||0;
let lockUntil=parseInt(localStorage.getItem("lockUntil"))||0;

const btn=document.getElementById("loginBtn");
const msg=document.getElementById("msg");

function updateTime(){
    const now=new Date();
    document.getElementById("datetime").innerText=
        now.toLocaleDateString()+" "+now.toLocaleTimeString();
}
setInterval(updateTime,1000);
updateTime();

function checkLock(){
    if(Date.now()<lockUntil){
        btn.disabled=true;
        let remaining=Math.ceil((lockUntil-Date.now())/1000);
        msg.style.color="red";
        msg.innerText="Account temporarily locked ("+remaining+"s)";
        setTimeout(checkLock,1000);
        return true;
    }
    btn.disabled=false;
    return false;
}
checkLock();

btn.addEventListener("click",function(){

if(checkLock()) return;

let card=document.getElementById("card").value.trim();
let pass=document.getElementById("pass").value.trim();

if(card===correctCard && pass===correctPass){
    msg.style.color="green";
    msg.innerText="Authentication successful";
    localStorage.removeItem("failCount");
    return;
}

failCount++;
localStorage.setItem("failCount",failCount);

msg.style.color="red";
msg.innerText="Invalid credentials";

if(failCount===3) lockUntil=Date.now()+30000;
if(failCount===6) lockUntil=Date.now()+60000;
if(failCount>=9) lockUntil=Date.now()+180000;

if(failCount>=3){
    localStorage.setItem("lockUntil",lockUntil);
    checkLock();
}

});

});
</script>

</body>
</html>
