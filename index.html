<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NEXUS CORE // ULTRA</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
background:#05070d;
color:#00eaff;
font-family:'Orbitron',sans-serif;
margin:0;
overflow:hidden;
}

.grid{
position:fixed;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
background-size:40px 40px;
z-index:-1;
}

.header{
text-align:center;
margin-top:80px;
letter-spacing:4px;
}

.title{
font-size:48px;
font-weight:600;
text-shadow:0 0 20px #00eaff;
}

.subtitle{
opacity:0.5;
margin-top:10px;
}

.panel{
width:420px;
margin:80px auto;
padding:30px;
border:1px solid rgba(0,255,255,0.3);
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
box-shadow:0 0 30px rgba(0,255,255,0.1);
}

button{
width:100%;
padding:14px;
margin-top:15px;
background:transparent;
border:1px solid #00eaff;
color:#00eaff;
font-family:'Orbitron';
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#00eaff;
color:#000;
box-shadow:0 0 20px #00eaff;
}

.status{
margin-top:20px;
font-size:12px;
opacity:0.6;
}

.scan{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
background:linear-gradient(transparent, rgba(0,255,255,0.08), transparent);
animation:scan 4s linear infinite;
}

@keyframes scan{
0%{transform:translateY(-100%)}
100%{transform:translateY(100%)}
}

</style>
</head>

<body>

<div class="grid"></div>
<div class="scan"></div>

<div class="header">
<div class="title">NEXUS CORE</div>
<div class="subtitle">GLOBAL NETWORK INTERFACE</div>
</div>

<div class="panel">

<button onclick="boot()">INITIALIZE SYSTEM</button>
<button onclick="secure()">SECURE CHANNEL</button>
<button onclick="deploy()">DEPLOY PROTOCOL</button>

<div class="status" id="status">
SYSTEM STATUS : STANDBY
</div>

</div>

<script>

function boot(){
document.getElementById("status").innerText="SYSTEM STATUS : BOOTING CORE..."
}

function secure(){
document.getElementById("status").innerText="SYSTEM STATUS : ENCRYPTED CHANNEL ESTABLISHED"
}

function deploy(){
document.getElementById("status").innerText="SYSTEM STATUS : PROTOCOL DEPLOYED"
}

</script>

</body>
</html>
