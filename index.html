<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS CORE - Access Control</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI,Tahoma,sans-serif;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#1f2d3a,#2f4454);
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  width:100%;
  padding:20px;
  text-align:center;
}

.card{
  width:100%;
  max-width:480px;
  margin:auto;
  background:white;
  padding:45px 35px;
  border-radius:20px;
  box-shadow:0 25px 60px rgba(0,0,0,0.35);
}

.logo{
  width:110px;
  margin-bottom:15px;
}

h2{
  font-size:26px;
  margin-bottom:5px;
}

.subtitle{
  color:#777;
  margin-bottom:30px;
}

input{
  width:100%;
  padding:14px;
  margin-bottom:18px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:15px;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  background:#2f4454;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:disabled{
  background:gray;
  cursor:not-allowed;
}

.error{
  color:red;
  margin-bottom:10px;
}

.footer{
  margin-top:20px;
  color:white;
  font-size:14px;
  opacity:0.8;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <img src="logo.png" class="logo">
    <h2>NEXUS CORE</h2>
    <div class="subtitle">Access Control System</div>

    <div class="error" id="errorMsg"></div>

    <input type="text" id="card" placeholder="รหัสประจำตัวเจ้าหน้าที่">
    <input type="password" id="pass" placeholder="รหัสผ่าน">

    <button onclick="login()" id="loginBtn">เข้าสู่ระบบ</button>
  </div>

  <div class="footer">
    © 2026 NEXUS CORE Security Division
  </div>
</div>

<script>
const correctCard="LC-A01";
const correctPass="Lc1993♧";

let attempts = localStorage.getItem("attempts") 
    ? parseInt(localStorage.getItem("attempts")) : 0;

let lockUntil = localStorage.getItem("lockUntil") 
    ? parseInt(localStorage.getItem("lockUntil")) : 0;

checkLock();

function login(){

  if(Date.now() < lockUntil){
    showError("ระบบถูกล็อคชั่วคราว กรุณารอ...");
    return;
  }

  let card=document.getElementById("card").value;
  let pass=document.getElementById("pass").value;

  if(card===correctCard && pass===correctPass){
      localStorage.setItem("loggedIn","true");
      alert("เข้าสู่ระบบสำเร็จ");
      location.reload();
  }else{
      attempts++;
      localStorage.setItem("attempts",attempts);

      if(attempts==3) lock(60000);      // 1 นาที
      if(attempts==6) lock(180000);     // 3 นาที
      if(attempts>=9) lock(600000);     // 10 นาที

      showError("รหัสไม่ถูกต้อง");
  }
}

function lock(duration){
  lockUntil = Date.now() + duration;
  localStorage.setItem("lockUntil",lockUntil);
  document.getElementById("loginBtn").disabled=true;
}

function checkLock(){
  if(Date.now() < lockUntil){
      document.getElementById("loginBtn").disabled=true;
      showError("บัญชีถูกล็อคชั่วคราว");
  }else{
      document.getElementById("loginBtn").disabled=false;
  }
}

function showError(msg){
  document.getElementById("errorMsg").innerText=msg;
}

window.onload=function(){
  if(localStorage.getItem("loggedIn")==="true"){
    document.body.innerHTML="<h1 style='color:white;text-align:center;margin-top:40vh;'>WELCOME NEXUS CORE</h1>";
  }
}
</script>

</body>
</html>
