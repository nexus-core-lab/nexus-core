<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Core System</title>

<style>

body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#071e26,#0f4c5c);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.card{
background:#ffffff;
padding:35px;
width:340px;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.4);
text-align:center;
position:relative;
}

.logo{
width:80px;
margin-bottom:15px;
}

.title{
font-size:20px;
font-weight:bold;
letter-spacing:2px;
}

.subtitle{
color:#666;
margin-bottom:20px;
}

.sysinfo{
font-size:12px;
color:#777;
margin-bottom:20px;
line-height:18px;
}

input{
width:100%;
padding:12px;
margin:7px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:8px;
background:#34495e;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#2c3e50;
}

button:disabled{
background:#9aa3ad;
cursor:not-allowed;
}

#message{
margin-top:10px;
font-size:13px;
color:red;
min-height:18px;
}

.footer{
font-size:11px;
margin-top:15px;
color:#777;
}

.scan{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(
transparent,
rgba(0,255,200,0.15),
transparent
);
animation:scan 3s infinite;
pointer-events:none;
}

@keyframes scan{
0%{transform:translateY(-100%)}
100%{transform:translateY(100%)}
}

.alert{
animation:shake 0.4s;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
75%{transform:translateX(-5px)}
100%{transform:translateX(0)}
}

</style>
</head>

<body>

<div class="card" id="card">

<div class="scan"></div>

<img src="logo.png" class="logo">

<div class="title">NEXUS CORE SYSTEM</div>
<div class="subtitle">Secure Access Portal</div>

<div class="sysinfo">
SYSTEM ID: NX-CORE-771A<br>
SECURITY LEVEL: OMEGA<br>
NETWORK NODE: GLOBAL GRID
</div>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button id="loginBtn" onclick="login()">SIGN IN</button>

<div id="message"></div>

<div class="footer">
WARNING: Authorized personnel only.<br>
© 2025 Nexus Core Systems
</div>

</div>

<script>

const ADMIN_ID="admin"
const ADMIN_PASS="1234"
const LINE_URL="https://lin.ee/lGGma6p"

let attempts=localStorage.getItem("attempts")||0
let lockUntil=localStorage.getItem("lockUntil")||0

const msg=document.getElementById("message")
const btn=document.getElementById("loginBtn")
const card=document.getElementById("card")

function logAccess(status){

let logs=JSON.parse(localStorage.getItem("accessLogs")||"[]")

logs.push({
time:new Date().toLocaleString(),
status:status
})

localStorage.setItem("accessLogs",JSON.stringify(logs))

}

function startCountdown(){

btn.disabled=true

let timer=setInterval(()=>{

let remain=Math.floor((lockUntil-Date.now())/1000)

if(remain<=0){

clearInterval(timer)

btn.disabled=false
msg.innerText="System ready."

}else{

msg.innerText="Security Lock "+remain+"s"

}

},1000)

}

function login(){

let user=document.getElementById("user").value
let pass=document.getElementById("pass").value

if(Date.now()<lockUntil){
startCountdown()
return
}

if(user===ADMIN_ID && pass===ADMIN_PASS){

logAccess("AUTHORIZED")

msg.style.color="green"
msg.innerText="ACCESS GRANTED"

let token=Math.random().toString(36).substring(2)
localStorage.setItem("sessionToken",token)

setTimeout(()=>{
window.location.href="dashboard.html"
},1200)

}else{

attempts++

localStorage.setItem("attempts",attempts)

card.classList.add("alert")

setTimeout(()=>card.classList.remove("alert"),400)

msg.style.color="red"

logAccess("DENIED")

if(attempts>=3){

lockUntil=Date.now()+30000
localStorage.setItem("lockUntil",lockUntil)

msg.innerText="SECURITY LOCK 30s"

attempts=0
localStorage.setItem("attempts",0)

startCountdown()

}else{

msg.innerText="ACCESS DENIED ("+attempts+"/3)"

}

}

}

if(Date.now()<lockUntil){
startCountdown()
}

</script>

</body>
</html>
