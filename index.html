<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Core System</title>

<style>

body{
font-family:Arial, sans-serif;
background:linear-gradient(180deg,#0b3b4a,#072f3b);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

.login-box{
background:white;
padding:35px;
border-radius:12px;
width:320px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.logo{
width:60px;
margin-bottom:10px;
}

h2{
margin:5px;
font-size:16px;
letter-spacing:1px;
}

p{
margin-top:0;
font-size:12px;
color:#666;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#2c3e50;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:disabled{
background:#999;
}

.msg{
margin-top:10px;
font-size:13px;
color:red;
}

.footer{
margin-top:12px;
font-size:10px;
color:#777;
}

</style>
</head>

<body>

<div class="login-box">

<img src="logo.png" class="logo">

<h2>NEXUS CORE SYSTEM</h2>
<p>Secure Access Portal</p>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()" id="btn">SIGN IN</button>

<div class="msg" id="msg"></div>

<div class="footer">
Authorized personnel only. All access is logged and monitored.<br>
© 2025 Nexus Core Systems v2.4.1
</div>

</div>

<script>

let attempts = localStorage.getItem("attempts") || 0
let lockUntil = localStorage.getItem("lockUntil") || 0

attempts = parseInt(attempts)
lockUntil = parseInt(lockUntil)

function updateLock(){

let now = Date.now()

if(now < lockUntil){

let remaining = Math.ceil((lockUntil-now)/1000)

document.getElementById("btn").disabled=true
document.getElementById("msg").innerText=
"Security Lock Active - Retry in "+remaining+"s"

setTimeout(updateLock,1000)

}else{

document.getElementById("btn").disabled=false
document.getElementById("msg").innerText=""

}

}

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u==="admin" && p==="1234"){

attempts=0
localStorage.setItem("attempts",0)

document.getElementById("msg").style.color="green"
document.getElementById("msg").innerText="Access Granted"

setTimeout(()=>{
window.location.href="https://lin.ee/lGGma6p"
},1000)

return
}

attempts++
localStorage.setItem("attempts",attempts)

let lock=0

if(attempts>=9) lock=180
else if(attempts>=6) lock=90
else if(attempts>=3) lock=30

if(lock>0){

lockUntil=Date.now()+lock*1000
localStorage.setItem("lockUntil",lockUntil)

}

document.getElementById("msg").innerText=
"Authentication failed"

updateLock()

}

updateLock()

</script>

</body>
</html>
