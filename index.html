<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Core System</title>

<style>

body{
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:linear-gradient(135deg,#0f3d3e,#0b2c2d);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:40px;
border-radius:20px;
width:320px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,.25);
}

.logo{
width:48px;
margin-bottom:10px;
}

h1{
font-size:22px;
font-weight:600;
letter-spacing:1px;
margin:5px 0;
}

.subtitle{
color:#777;
font-size:14px;
margin-bottom:20px;
}

.system{
font-size:12px;
color:#888;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #d8d8d8;
border-radius:10px;
font-size:14px;
}

button{
width:100%;
padding:13px;
background:#3a4a59;
color:white;
border:none;
border-radius:10px;
font-size:14px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#2f3f4d;
}

.status{
margin-top:15px;
font-size:13px;
color:#666;
}

.log{
margin-top:15px;
background:#0e0e0e;
color:#aaa;
font-family:monospace;
padding:10px;
border-radius:8px;
font-size:12px;
text-align:left;
height:70px;
overflow:auto;
}

.footer{
margin-top:20px;
font-size:11px;
color:#777;
}

.error{
color:#c0392b;
margin-top:10px;
font-size:13px;
}

</style>
</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<h1>NEXUS CORE SYSTEM</h1>
<div class="subtitle">Secure Access Portal</div>

<div class="system">
SYSTEM ID: NX-CORE-771A<br>
SECURITY LEVEL: OMEGA<br>
NETWORK NODE: GLOBAL GRID
</div>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">SIGN IN</button>

<div class="error" id="error"></div>

<div class="status">
System Status: ONLINE | Encryption: AES-256
</div>

<div class="log" id="log">
[boot] nexus core initialized
</div>

<div class="footer">
Authorized personnel only.<br>
Unauthorized access is prohibited.<br>
© 2025 Nexus Core Systems
</div>

</div>

<script>

let attempts = 0
let locked = false

function log(msg){
let time=new Date().toLocaleTimeString()
document.getElementById("log").innerHTML += `<br>[${time}] ${msg}`
}

function login(){

if(locked)return

let user=document.getElementById("user").value
let pass=document.getElementById("pass").value
let error=document.getElementById("error")

error.innerText=""

log("authentication request received")

if(user==="admin" && pass==="1234"){

log("credentials verified")
log("generating secure session")

error.style.color="#2ecc71"
error.innerText="Authenticating..."

setTimeout(()=>{
window.location="dashboard.html"
},1200)

}else{

attempts++

log("authentication failed")

error.innerText="Access denied"

if(attempts>=3){

locked=true
log("security lock activated")
error.innerText="System locked"

}

}

}

</script>

</body>
</html>
