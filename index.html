<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Control</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#e9edf1;
}

.topbar{
    background:#1f343d;
    color:white;
    padding:12px 20px;
    display:flex;
    justify-content:space-between;
    font-size:14px;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:85vh;
}

.card{
    background:white;
    padding:35px;
    width:320px;
    text-align:center;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

.logo{
    width:70px;
    margin-bottom:15px;
}

h2{
    margin:5px 0;
}

.subtitle{
    color:gray;
    font-size:13px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    font-size:14px;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#324b55;
    color:white;
    border:none;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#243a42;
}

button:disabled{
    background:#7f8c91;
}

.error{
    color:red;
    font-size:13px;
    margin-top:10px;
}

.footer{
    margin-top:15px;
    font-size:11px;
    color:#666;
}
</style>
</head>
<body>

<div class="topbar">
    <div>ศูนย์ควบคุมสิทธิการเข้าใช้งาน</div>
    <div id="time"></div>
</div>

<div class="container">
<div class="card">

    <!-- โลโก้ -->
    <img src="https://cdn-icons-png.flaticon.com/512/3064/3064197.png" class="logo">

    <h2>ระบบตรวจสอบสิทธิการเข้าใช้งาน</h2>
    <div class="subtitle">Access Control System</div>

    <input type="text" id="card" placeholder="รหัสประจำตัวเจ้าหน้าที่">
    <input type="password" id="pass" placeholder="รหัสผ่าน">

    <button onclick="login()" id="loginBtn">เข้าสู่ระบบ</button>

    <div class="error" id="errorMsg"></div>

    <div class="footer">
        การเข้าสู่ระบบโดยไม่ได้รับอนุญาต อาจมีความผิดตามกฎหมายที่เกี่ยวข้อง
    </div>

</div>
</div>

<script>

// 🔐 รหัสที่ถูกต้อง
const correctCard = "LC-A01";
const correctPass = "Lc1993♧";

function login(){

    const card = document.getElementById("card").value;
    const pass = document.getElementById("pass").value;
    const btn = document.getElementById("loginBtn");
    const error = document.getElementById("errorMsg");

    error.textContent = "";
    btn.disabled = true;
    btn.textContent = "กำลังตรวจสอบ...";

    setTimeout(() => {

        if(card === correctCard && pass === correctPass){
            window.location.href = "success.html";
        }else{
            error.textContent = "รหัสประจำตัวหรือรหัสผ่านไม่ถูกต้อง";
            btn.disabled = false;
            btn.textContent = "เข้าสู่ระบบ";
        }

    },1000);
}

// นาฬิกา
function updateTime(){
    const now = new Date();
    document.getElementById("time").textContent =
        now.toLocaleDateString("th-TH") + " " +
        now.toLocaleTimeString("th-TH");
}
setInterval(updateTime,1000);
updateTime();

</script>

</body>
</html>
