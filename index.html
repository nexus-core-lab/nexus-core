<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nexus Core System</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:35px;
border-radius:18px;
width:340px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

.logo{
width:70px;
margin-bottom:10px;
}

h1{
margin:8px 0;
font-size:24px;
letter-spacing:1px;
}

.sub{
color:#666;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#2f4156;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1e2d3e;
}

.status{
margin-top:10px;
font-size:14px;
color:#777;
}

.lock{
color:red;
font-weight:bold;
}

</style>
</head>

<body>

<div class="box">

<img src="logo.png" class="logo">

<h1>NEXUS CORE</h1>
<div class="sub">Secure Access Portal</div>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">SIGN IN</button>

<div class="status" id="msg"></div>

</div>

<script>

let maxFail=1
let lockTime=30000

function login(){

let now=Date.now()
let lock=localStorage.getItem("lockUntil")

if(lock && now<lock){

let sec=Math.ceil((lock-now)/1000)
document.getElementById("msg").innerHTML=
"<span class='lock'>System Locked "+sec+"s</span>"

return
}

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u==="admin" && p==="1234"){

localStorage.removeItem("fail")

document.getElementById("msg").innerText="Access Granted"

setTimeout(()=>{
window.location.href="https://lin.ee/lGGma6p"
},800)

return
}

let fail=localStorage.getItem("fail")
fail=fail?parseInt(fail)+1:1
localStorage.setItem("fail",fail)

if(fail>=maxFail){

let until=Date.now()+lockTime
localStorage.setItem("lockUntil",until)

document.getElementById("msg").innerHTML=
"<span class='lock'>Login Failed - System Locked</span>"

}else{

document.getElementById("msg").innerText="Invalid Credentials"

}

}

</script>

</body>
</html>
