<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS Secure System</title>

<style>
body{
    margin:0;
    font-family:Tahoma, sans-serif;
    background:#dcdcdc;
}

.topbar{
    background:#000;
    color:#fff;
    padding:10px;
    display:flex;
    justify-content:space-between;
    font-size:14px;
}

.container{
    max-width:480px;
    margin:40px auto;
    background:#f2f2f2;
    padding:40px 30px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.logo{
    width:110px;
    margin-bottom:20px;
}

h2{
    margin:10px 0;
}

.subtitle{
    color:#555;
    font-size:14px;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:2px solid #888;
    background:#e9e9e9;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#777;
    color:white;
    border:none;
    font-size:16px;
    cursor:pointer;
}

button:disabled{
    background:#aaa;
}

#msg{
    margin-top:15px;
    font-weight:bold;
}

.footer{
    margin-top:20px;
    font-size:13px;
    color:#777;
}
</style>
</head>

<body>

<div class="topbar">
    <div>เครือข่ายภายในที่ปลอดภัย</div>
    <div id="datetime"></div>
</div>

<div class="container">

    <img src="logo.png" class="logo">

    <h2>ระบบสารสนเทศหลัก NEXUS</h2>

    <div class="subtitle">
        เฉพาะบุคลากรที่ได้รับอนุญาตเท่านั้น<br>
        ระดับการรักษาความปลอดภัย: ต้องมีใบอนุญาตระดับ 3
    </div>

    <input type="text" id="card" placeholder="รหัสบัตรประจำตัว">
    <input type="password" id="pass" placeholder="รหัสผ่าน">

    <button id="loginBtn" onclick="authenticate()">ยืนยันตัวตน</button>

    <div id="msg"></div>

    <div class="footer">
        การเข้าถึงโดยไม่ได้รับอนุญาตอาจถูกตรวจสอบและดำเนินคดี
    </div>

</div>

<script>
const correctCard = "LC-A01";
const correctPass = "Lc1993♧";

let failCount = 0;
let lockUntil = 0;
let timerInterval = null;

function updateTime(){
    const now = new Date();
    document.getElementById("datetime").innerText =
        now.toLocaleDateString("th-TH") + " " +
        now.toLocaleTimeString("th-TH");
}
setInterval(updateTime,1000);
updateTime();

function authenticate(){

    const now = Date.now();
    const message = document.getElementById("msg");
    const button = document.getElementById("loginBtn");

    if(now < lockUntil){
        return;
    }

    const card = document.getElementById("card").value.trim();
    const pass = document.getElementById("pass").value.trim();

    if(card === correctCard && pass === correctPass){

        message.style.color="green";
        message.innerText="ยืนยันตัวตนสำเร็จ";

        setTimeout(()=>{
            window.location.href="dashboard.html";
        },1500);

    }else{

        failCount++;
        message.style.color="red";
        message.innerText="ข้อมูลไม่ถูกต้อง";

        if(failCount === 3) lockSystem(30);
        if(failCount === 6) lockSystem(60);
        if(failCount === 9) lockSystem(180);
    }
}

function lockSystem(seconds){

    const message = document.getElementById("msg");
    const button = document.getElementById("loginBtn");

    lockUntil = Date.now() + seconds*1000;
    button.disabled=true;

    timerInterval=setInterval(()=>{

        const remaining=Math.ceil((lockUntil-Date.now())/1000);

        if(remaining<=0){
            clearInterval(timerInterval);
            button.disabled=false;
            message.innerText="";
        }else{
            message.style.color="red";
            message.innerText=
            "ระบบล็อกอยู่ โปรดลองใหม่อีกครั้งใน "
            + remaining + " วินาที";
        }

    },1000);
}
</script>

</body>
</html>
