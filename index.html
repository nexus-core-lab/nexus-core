<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<title>Nexus Core | Internal Access</title>

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:Segoe UI,Arial;
  background:#eef1f5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  padding:16px;
}
.card{
  background:#fff;
  width:100%;
  max-width:420px;
  padding:45px 30px;
  border-radius:16px;
  box-shadow:0 20px 50px rgba(0,0,0,0.1);
  text-align:center;
}
.logo{width:100px;margin-bottom:20px;}
h1{margin-bottom:30px;font-size:20px;}
input{
  width:100%;
  padding:14px;
  margin-bottom:16px;
  border:1px solid #ccc;
  border-radius:8px;
  font-size:15px;
}
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:8px;
  background:#1f2937;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}
.error{
  color:#dc2626;
  font-size:13px;
  margin-bottom:12px;
  display:none;
}
</style>
</head>

<body>

<div class="card">

<img src="logo.png" class="logo" onerror="this.style.display='none'">

<h1>Internal Access Portal</h1>

<div id="errorMsg" class="error"></div>

<input type="text" id="empId" placeholder="Employee ID">
<input type="password" id="password" placeholder="Password">

<button id="loginBtn">SIGN IN</button>

</div>

<script>
const SESSION_DURATION = 5 * 60 * 1000;

document.getElementById("loginBtn").addEventListener("click", function(){

  const id = document.getElementById("empId").value.trim();
  const pass = document.getElementById("password").value.trim();
  const error = document.getElementById("errorMsg");

  error.style.display="none";

  if(!id || !pass){
    error.textContent="Please enter Employee ID and Password";
    error.style.display="block";
    return;
  }

  if(id==="admin" && pass==="1234"){
    localStorage.setItem("sessionExpiry", Date.now()+SESSION_DURATION);
    window.location.href="dashboard.html";
  }else{
    error.textContent="Invalid credentials";
    error.style.display="block";
  }

});
</script>

</body>
</html>
