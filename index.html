<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Nexus Core System</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0c3b43;
font-family:Arial,Helvetica,sans-serif;
}

.login-box{
background:white;
padding:35px;
border-radius:12px;
width:320px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.logo{
width:70px;
display:block;
margin:auto;
margin-bottom:10px;
}

h1{
font-size:20px;
margin:5px 0;
letter-spacing:1px;
}

.subtitle{
font-size:14px;
color:#666;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:#2d4059;
color:white;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

button:disabled{
background:#9aa3ad;
}

.lock-msg{
color:#c0392b;
font-size:14px;
margin-top:10px;
}

.footer{
margin-top:15px;
font-size:12px;
color:#777;
}

</style>
</head>

<body>

<div class="login-box">

<img src="logo.png" class="logo">

<h1>NEXUS CORE SYSTEM</h1>
<div class="subtitle">Secure Access Portal</div>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button id="loginBtn" onclick="login()">SIGN IN</button>

<div id="lockMsg" class="lock-msg"></div>

<div class="footer">
Authorized personnel only. All access is logged and monitored.<br>
© 2025 Nexus Core Systems<br>
Internal Access Gateway v2.4.1
</div>

</div>

<script>

const ADMIN_ID="admin"
const ADMIN_PASS="1234"

let attempts = localStorage.getItem("attempts") || 0
let lockUntil = localStorage.getItem("lockUntil") || 0

function updateLock(){

const now = Date.now()

if(now < lockUntil){

let sec = Math.ceil((lockUntil-now)/1000)

document.getElementById("loginBtn").disabled=true
document.getElementById("lockMsg").innerText =
"Security Lock Active — Retry in "+sec+"s"

setTimeout(updateLock,1000)

}else{

document.getElementById("loginBtn").disabled=false
document.getElementById("lockMsg").innerText=""

}

}

function login(){

const user=document.getElementById("user").value
const pass=document.getElementById("pass").value

if(Date.now() < lockUntil) return

if(user===ADMIN_ID && pass===ADMIN_PASS){

localStorage.setItem("attempts",0)
window.location.href="https://lin.ee/lGGma6p"

}else{

attempts++
localStorage.setItem("attempts",attempts)

let lockTime=0

if(attempts==3) lockTime=30
if(attempts==6) lockTime=90
if(attempts>=9) lockTime=180

if(lockTime>0){

lockUntil = Date.now() + lockTime*1000

localStorage.setItem("lockUntil",lockUntil)

}

updateLock()

}

}

updateLock()

</script>

</body>
</html>
