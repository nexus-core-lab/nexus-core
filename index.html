<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexus Core System</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#081c24,#0f4c5c);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
color:#333;
}

.card{
background:#fff;
padding:35px;
width:330px;
border-radius:18px;
box-shadow:0 15px 40px rgba(0,0,0,0.4);
text-align:center;
}

.logo{
width:75px;
margin-bottom:10px;
}

.title{
font-size:22px;
font-weight:bold;
letter-spacing:2px;
}

.subtitle{
color:#666;
font-size:14px;
margin-bottom:15px;
}

.systeminfo{
font-size:12px;
color:#888;
margin-bottom:20px;
line-height:1.6;
}

input{
width:100%;
padding:12px;
margin:7px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#2f4057;
color:white;
font-weight:bold;
letter-spacing:1px;
cursor:pointer;
}

button:hover{
background:#243447;
}

button:disabled{
background:#9aa3ad;
}

#message{
margin-top:10px;
font-size:13px;
color:red;
}

.status{
font-size:11px;
margin-top:10px;
color:#444;
}

.log{
background:#111;
color:#0f0;
font-size:10px;
padding:10px;
margin-top:15px;
border-radius:6px;
text-align:left;
height:60px;
overflow:hidden;
font-family:monospace;
}

.footer{
font-size:11px;
margin-top:12px;
color:#777;
}

</style>
</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<div class="title">NEXUS CORE SYSTEM</div>
<div class="subtitle">Secure Access Portal</div>

<div class="systeminfo">
SYSTEM ID: NX-CORE-771A<br>
SECURITY LEVEL: OMEGA<br>
NETWORK NODE: GLOBAL GRID
</div>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button id="loginBtn" onclick="login()">SIGN IN</button>

<div id="message"></div>

<div class="status">
SYSTEM STATUS: ONLINE<br>
ENCRYPTION: AES-256
</div>

<div class="log" id="log">
[system] nexus core initialized<br>
</div>

<div class="footer">
WARNING: Authorized personnel only.<br>
All activity monitored.<br>
© 2025 Nexus Core Systems
</div>

</div>

<script>

const ADMIN_ID="admin"
const ADMIN_PASS="1234"
const LINE_URL="https://lin.ee/lGGma6p"

let attempts=0

const msg=document.getElementById("message")
const btn=document.getElementById("loginBtn")
const log=document.getElementById("log")

function addLog(text){

let time=new Date().toLocaleTimeString()

log.innerHTML+="["+time+"] "+text+"<br>"

log.scrollTop=log.scrollHeight

}

function login(){

let id=document.getElementById("user").value
let pw=document.getElementById("pass").value

addLog("credentials submitted")

msg.innerHTML="Verifying credentials..."

btn.disabled=true

setTimeout(()=>{

addLog("network scan complete")

if(id===ADMIN_ID && pw===ADMIN_PASS){

addLog("authentication success")

msg.style.color="green"
msg.innerHTML="Access Granted"

setTimeout(()=>{
window.location.href=LINE_URL
},1000)

return
}

attempts++

addLog("authentication failed")

msg.style.color="red"
msg.innerHTML="Invalid credentials (attempt "+attempts+")"

btn.disabled=false

if(attempts>=1){

addLog("security lock triggered")

msg.innerHTML="Security Lock Activated"

btn.disabled=true

setTimeout(()=>{
btn.disabled=false
msg.innerHTML=""
},15000)

}

},1500)

}

addLog("connection established")
addLog("awaiting credentials")

</script>

</body>
</html>
