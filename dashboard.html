<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
</head>

<body style="font-family:sans-serif;text-align:center;padding-top:100px;background:#111827;color:white;">

<script>
if(localStorage.getItem("session")!=="active"){
  window.location.href="index.html";
}
</script>

<h2>Secure Environment Access Granted</h2>

<button onclick="logout()" style="margin-top:20px;padding:10px 20px;">Sign Out</button>

<script>
function logout(){
  localStorage.removeItem("session");
  window.location.href="index.html";
}
</script>

</body>
</html>
