<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS CORE | Dashboard</title>

<style>
body{
  margin:0;
  font-family:Segoe UI, Arial, sans-serif;
  background:linear-gradient(135deg,#1b2735,#2c3e50);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}
.container{
  max-width:400px;
}
button{
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:6px;
  background:#fff;
  color:#2c3e50;
  cursor:pointer;
}
.timer{
  margin-top:10px;
  font-size:14px;
  opacity:0.8;
}
</style>
</head>

<body>

<div class="container">
  <h1>NEXUS CORE</h1>
  <p>Secure Environment · Access Granted</p>

  <div class="timer" id="timer"></div>

  <button onclick="logout()">Sign Out</button>
</div>

<script>
const session = JSON.parse(localStorage.getItem("nexusSession"));

if(!session){
  window.location.href="index.html";
}

function updateTimer(){
  const now = Date.now();
  const remaining = session.expireTime - now;

  if(remaining <= 0){
    logout();
  }

  const minutes = Math.floor((remaining/1000)/60);
  const seconds = Math.floor((remaining/1000)%60);

  document.getElementById("timer").innerText =
    "Session expires in: " + minutes + "m " + seconds + "s";
}

function logout(){
  localStorage.removeItem("nexusSession");
  window.location.href="index.html";
}

setInterval(updateTimer,1000);
updateTimer();
</script>

</body>
</html>
