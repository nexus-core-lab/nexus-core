<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS CORE | Dashboard</title>

<style>
body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  background:linear-gradient(145deg,#1b2735,#2c3e50);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
  text-align:center;
}

button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:8px;
  background:white;
  color:#2c3e50;
  font-weight:600;
  cursor:pointer;
}
</style>
</head>
<body>

<h1>NEXUS CORE</h1>
<p>Secure Environment · Access Granted</p>
<p id="timer"></p>

<button onclick="logout()">Sign Out</button>

<script>
const session = JSON.parse(localStorage.getItem("session"));
const MAX_SESSION = 5 * 60 * 1000; // 5 นาที

if(!session){
  window.location.href="index.html";
}

function checkSession(){
  const now = Date.now();
  const diff = now - session.loginTime;

  if(diff > MAX_SESSION){
    alert("Session expired");
    logout();
  }

  const remaining = Math.floor((MAX_SESSION - diff)/1000);
  document.getElementById("timer").textContent =
    "Session expires in: " + remaining + " seconds";
}

function logout(){
  localStorage.removeItem("session");
  window.location.href="index.html";
}

setInterval(checkSession,1000);
</script>

</body>
</html>
